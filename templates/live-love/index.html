<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omah Aksara — Private Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Montserrat:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6F806A; --bg: #F5F1EA; --text: #2D352E; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Layout Aesthetic */
        .editorial-frame { position: fixed; inset: 0; border: 20px solid var(--bg); pointer-events: none; z-index: 100; }
        .inner-line { position: fixed; inset: 35px; border: 0.5px solid rgba(111, 128, 106, 0.3); pointer-events: none; z-index: 101; }

        .btn-luxe {
            border: 1px solid var(--accent); padding: 16px 40px; font-size: 11px;
            letter-spacing: 0.4em; text-transform: uppercase; transition: all 0.5s ease;
        }
        .btn-luxe:hover { background: var(--accent); color: white; }

        .reveal-mask {
            clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
            transition: clip-path 1.5s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .reveal-mask.active { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
    </style>
</head>
<body>
    <div class="editorial-frame"></div>
    <div class="inner-line"></div>

    <!-- PRELOADER / OPENING -->
    <section id="opening" class="fixed inset-0 z-[200] bg-[#F5F1EA] flex flex-col items-center justify-center text-center">
        <div class="mb-10">
            <h2 class="font-serif italic text-2xl opacity-60">The Wedding of</h2>
            <div class="w-px h-16 bg-[#6F806A]/40 mx-auto my-6"></div>
            <h1 id="coupleNameHeader" class="text-6xl md:text-8xl font-serif tracking-tighter italic"></h1>
        </div>
        <button onclick="unlockInvitation()" class="btn-luxe">Buka Undangan</button>
    </section>

    <!-- CONTENT -->
    <main id="mainContent" class="hidden">
        <!-- HERO -->
        <section class="min-h-screen flex flex-col items-center pt-32 pb-20 px-6">
            <div id="heroMask" class="reveal-mask w-full max-w-2xl">
                <img id="heroImg" src="" class="w-full h-[75vh] object-cover contrast-[1.05]">
            </div>
            <div class="mt-12 text-center">
                <p class="text-[10px] tracking-[0.6em] uppercase opacity-50 mb-4">Official Invitation</p>
                <h2 id="mainDate" class="text-4xl font-serif italic"></h2>
            </div>
        </section>

        <!-- QUOTE -->
        <section class="py-32 px-10 text-center max-w-4xl mx-auto">
            <p id="quoteArab" class="text-3xl font-serif text-[#6F806A] mb-8 leading-relaxed"></p>
            <p id="quoteText" class="italic opacity-70 font-serif text-lg leading-relaxed mb-4"></p>
            <span id="quoteSource" class="text-[10px] tracking-widest uppercase opacity-40"></span>
        </section>

        <!-- BRIDE & GROOM -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-0 border-y border-[#6F806A]/10">
            <div class="p-16 md:p-24 flex flex-col justify-center border-b md:border-b-0 md:border-r border-[#6F806A]/10">
                <span class="text-[9px] tracking-[0.5em] uppercase text-[#6F806A] mb-6">The Groom</span>
                <img id="groomImg" src="" class="w-32 h-32 rounded-full object-cover mb-8 grayscale">
                <h3 id="groomFullName" class="text-4xl font-serif mb-4"></h3>
                <p id="groomParents" class="text-[10px] opacity-60 leading-loose uppercase tracking-widest"></p>
            </div>
            <div class="p-16 md:p-24 flex flex-col justify-center bg-[#2D352E] text-[#F5F1EA]">
                <span class="text-[9px] tracking-[0.5em] uppercase text-[#6F806A] mb-6">The Bride</span>
                <img id="brideImg" src="" class="w-32 h-32 rounded-full object-cover mb-8">
                <h3 id="brideFullName" class="text-4xl font-serif mb-4"></h3>
                <p id="brideParents" class="text-[10px] opacity-60 leading-loose uppercase tracking-widest"></p>
            </div>
        </section>

        <!-- EVENTS -->
        <section class="py-32 px-6">
            <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16" id="eventContainer">
                <!-- Events via JS -->
            </div>
        </section>

        <!-- STORY -->
        <section class="py-32 bg-white/50">
            <h2 class="text-center font-serif text-5xl mb-20 italic">Our Story</h2>
            <div class="max-w-2xl mx-auto px-10 space-y-16" id="storyContainer">
                <!-- Story via JS -->
            </div>
        </section>

        <footer class="py-40 text-center">
            <div class="w-px h-20 bg-[#6F806A]/30 mx-auto mb-10"></div>
            <p class="text-[10px] tracking-[0.8em] opacity-40 uppercase">Thank You</p>
            <h2 id="footerCouple" class="text-7xl font-serif italic mt-8 opacity-80"></h2>
        </footer>
    </main>

    <audio id="bgm" loop></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('c') || 'default'; 
        const path = `../../public/clients/${slug}/`;

        fetch(`${path}data.json`)
            .then(res => res.json())
            .then(data => {
                // Settings & Global
                document.documentElement.style.setProperty('--accent', data.settings.themeColor);
                document.documentElement.style.setProperty('--bg', data.settings.bgColor);
                document.documentElement.style.setProperty('--text', data.settings.textColor);

                // Names
                const pair = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
                document.getElementById('coupleNameHeader').innerText = pair;
                document.getElementById('footerCouple').innerText = pair;

                // Media
                document.getElementById('heroImg').src = path + data.gallery.heroImage;
                document.getElementById('groomImg').src = path + data.couple.groom.image;
                document.getElementById('brideImg').src = path + data.couple.bride.image;
                document.getElementById('bgm').src = path + data.logistics.music;

                // Couple Details
                document.getElementById('groomFullName').innerText = data.couple.groom.name;
                document.getElementById('groomParents').innerText = `Son of ${data.couple.groom.father} & ${data.couple.groom.mother}`;
                document.getElementById('brideFullName').innerText = data.couple.bride.name;
                document.getElementById('brideParents').innerText = `Daughter of ${data.couple.bride.father} & ${data.couple.bride.mother}`;

                // Quote
                document.getElementById('quoteArab').innerText = data.quote.arab;
                document.getElementById('quoteText').innerText = data.quote.text;
                document.getElementById('quoteSource').innerText = data.quote.source;
                document.getElementById('mainDate').innerText = data.events[0].date;

                // Map Events
                const eventHtml = data.events.map((ev, i) => `
                    <div class="border-l border-[#6F806A]/20 pl-10 pb-10">
                        <span class="text-[9px] text-[#6F806A] font-bold tracking-[0.4em] uppercase">Part 0${i+1}</span>
                        <h4 class="text-4xl font-serif mt-4 mb-2">${ev.title}</h4>
                        <p class="text-sm italic opacity-60 mb-6">${ev.date} | ${ev.startTime} - ${ev.endTime} ${ev.timezone}</p>
                        <p class="text-[11px] leading-relaxed tracking-widest uppercase font-medium max-w-xs">${ev.address}</p>
                        <a href="${ev.googleMaps}" target="_blank" class="inline-block mt-8 text-[9px] tracking-[0.3em] uppercase border-b border-[#6F806A] pb-1">View Location</a>
                    </div>
                `).join('');
                document.getElementById('eventContainer').innerHTML = eventHtml;

                // Map Story
                const storyHtml = data.loveStory.map(s => `
                    <div class="text-center">
                        <span class="text-[10px] text-[#6F806A] tracking-[0.5em] uppercase">${s.date}</span>
                        <h4 class="text-2xl font-serif italic mt-2 mb-4">${s.title}</h4>
                        <p class="text-sm opacity-60 leading-relaxed font-light">${s.description}</p>
                    </div>
                `).join('');
                document.getElementById('storyContainer').innerHTML = storyHtml;
            })
            .catch(e => console.error("JSON Error: ", e));

        function unlockInvitation() {
            const audio = document.getElementById('bgm');
            audio.play().catch(() => console.log("Audio play deferred"));
            
            gsap.to("#opening", { 
                y: "-100%", duration: 1.5, ease: "expo.inOut", 
                onComplete: () => {
                    document.getElementById('opening').style.display = 'none';
                    document.getElementById('mainContent').classList.remove('hidden');
                    document.getElementById('heroMask').classList.add('active');
                    initScrollAnims();
                } 
            });
        }

        function initScrollAnims() {
            gsap.registerPlugin(ScrollTrigger);
            gsap.utils.toArray("section").forEach(section => {
                gsap.from(section, {
                    scrollTrigger: { trigger: section, start: "top 80%" },
                    opacity: 0, y: 50, duration: 1.2, ease: "power2.out"
                });
            });
        }
    </script>
</body>
</html>
