<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding Editorial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #C5A059; --dark: #1A1A1A; }
        body { background: #fff; color: var(--dark); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-vogue { font-family: 'Playfair Display', serif; }
        
        /* Typography */
        .big-title { font-size: 15vw; line-height: 0.8; letter-spacing: -0.05em; font-weight: 900; }
        .outline-text { -webkit-text-stroke: 1px var(--dark); color: transparent; }

        /* Animation */
        .reveal { opacity: 0; transform: translateY(40px); transition: 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        /* Floating Element */
        .floating-label { position: absolute; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; transform: rotate(-90deg); transform-origin: left top; }
    </style>
</head>
<body>

<audio id="bgMusic" loop></audio>

<!-- COVER (Magazine Style) -->
<section id="cover" class="fixed inset-0 z-[100] bg-white flex flex-col justify-between p-6">
    <div class="flex justify-between items-start border-b border-black pb-4">
        <span class="text-[10px] font-bold tracking-widest">VOL. 2026 — NO. 01</span>
        <span class="text-[10px] font-bold tracking-widest">SPECIAL EDITION</span>
    </div>
    
    <div class="text-center">
        <h1 class="font-vogue big-title uppercase">THE<br>WEDDING</h1>
        <div class="flex justify-center gap-4 mt-4 font-vogue italic text-2xl" id="cover-pair">
            <!-- Names via JS -->
        </div>
    </div>

    <div class="space-y-6">
        <div class="border-t border-black pt-4">
            <p class="text-[10px] uppercase tracking-widest mb-2">Exclusive Invite For:</p>
            <h2 id="guest-name" class="font-vogue text-4xl italic"></h2>
        </div>
        <button id="open-btn" class="w-full bg-black text-white py-5 text-[10px] uppercase tracking-[8px] hover:bg-[#C5A059] transition-all">Open Magazine</button>
    </div>
</section>

<!-- MAIN APP -->
<main id="app" class="max-w-md mx-auto opacity-0 border-x border-gray-100">
    
    <!-- HEADER -->
    <section class="p-6">
        <div class="photo-container relative h-[500px] overflow-hidden">
            <img id="hero-img" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000" src="">
            <div class="absolute bottom-4 left-4 text-white">
                <p id="wedding-date" class="font-vogue text-4xl italic"></p>
            </div>
        </div>
    </section>

    <!-- INTRO -->
    <section class="py-20 px-8">
        <span class="floating-label -left-2 top-20 text-gray-300">ESTABLISHED 2026</span>
        <div id="quote-area" class="reveal">
            <h3 class="font-vogue text-6xl mb-8">“</h3>
            <p id="quote-text" class="text-2xl font-vogue italic leading-snug"></p>
            <p id="quote-source" class="mt-6 text-[10px] uppercase tracking-widest font-bold text-[#C5A059]"></p>
        </div>
    </section>

    <!-- COUPLE -->
    <section class="py-20 px-6 space-y-32">
        <div id="groom-wrap" class="reveal relative">
            <!-- Content via JS -->
        </div>
        <div id="bride-wrap" class="reveal relative">
            <!-- Content via JS -->
        </div>
    </section>

    <!-- EVENTS (Editorial Cards) -->
    <section id="event-section" class="py-20 bg-zinc-900 text-white hidden">
        <h2 class="font-vogue text-5xl px-6 mb-12">The<br><span class="outline-text">Itinerary</span></h2>
        <div id="event-list" class="px-6 space-y-12"></div>
    </section>

    <!-- GALLERY -->
    <section id="gallery-section" class="py-20 px-4 hidden">
        <h2 class="font-vogue text-center text-4xl mb-12 uppercase tracking-tighter">Lookbook</h2>
        <div id="gallery-grid" class="grid grid-cols-12 gap-2"></div>
    </section>

    <!-- FOOTER -->
    <footer class="py-32 text-center border-t border-gray-100">
        <p class="text-[10px] uppercase tracking-[10px] mb-8">Coming Soon</p>
        <h2 id="footer-pair" class="font-vogue text-6xl px-4 italic"></h2>
    </footer>

</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const c = params.get('c');
    const guest = params.get('to')?.replace(/\+/g, ' ') || 'Tamu Terhormat';
    const path = `../../public/clients/${c}/`;

    fetch(`${path}data.json`).then(r => r.json()).then(data => {
        // Init UI
        const pair = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
        document.getElementById('cover-pair').innerText = pair;
        document.getElementById('guest-name').innerText = guest;
        document.getElementById('footer-pair').innerText = pair;
        document.getElementById('hero-img').src = path + data.gallery.heroImage;
        
        if(data.events?.[0]) document.getElementById('wedding-date').innerText = data.events[0].date;

        // Quote
        if(data.quote) {
            document.getElementById('quote-text').innerText = data.quote.text;
            document.getElementById('quote-source').innerText = data.quote.source;
        }

        // Couple (Magazine Layout)
        const renderCouple = (p, target, align) => {
            document.getElementById(target).innerHTML = `
                <div class="flex ${align === 'right' ? 'flex-row-reverse' : ''} gap-4">
                    <img src="${path + p.image}" class="w-2/3 h-[400px] object-cover grayscale">
                    <div class="w-1/3 flex flex-col justify-end">
                        <h4 class="font-vogue text-4xl transform -rotate-90 origin-bottom-left whitespace-nowrap mb-12 text-[var(--accent)] uppercase">${p.nickname}</h4>
                    </div>
                </div>
                <div class="mt-6 ${align === 'right' ? 'text-right' : ''}">
                    <p class="font-bold text-sm uppercase mb-2">${p.name}</p>
                    <p class="text-[10px] opacity-60">Pihak Keluarga:</p>
                    <p class="text-xs italic">${p.father} & ${p.mother}</p>
                </div>
            `;
        }
        renderCouple(data.couple.groom, 'groom-wrap', 'left');
        renderCouple(data.couple.bride, 'bride-wrap', 'right');

        // Events
        if(data.events?.length) {
            document.getElementById('event-section').classList.remove('hidden');
            data.events.forEach(e => {
                document.getElementById('event-list').innerHTML += `
                    <div class="border-l border-white/20 pl-6 py-4">
                        <h5 class="font-vogue text-2xl text-[var(--accent)] mb-2">${e.title}</h5>
                        <p class="text-sm font-bold">${e.date}</p>
                        <p class="text-xs opacity-60">${e.startTime} - ${e.endTime}</p>
                        <p class="text-xs italic mt-4">${e.address}</p>
                        <a href="${e.googleMaps}" class="inline-block mt-4 text-[9px] border-b border-[var(--accent)] tracking-widest uppercase">Check Location</a>
                    </div>
                `;
            });
        }

        // Gallery Lookbook
        if(data.gallery.album) {
            document.getElementById('gallery-section').classList.remove('hidden');
            data.gallery.album.forEach((img, idx) => {
                const colSpan = (idx % 3 === 0) ? 'col-span-12' : 'col-span-6';
                document.getElementById('gallery-grid').innerHTML += `
                    <div class="${colSpan} overflow-hidden reveal">
                        <img src="${path + img}" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700">
                    </div>
                `;
            });
        }

        // Interactions
        document.getElementById('open-btn').onclick = () => {
            document.getElementById('cover').style.transform = 'translateY(-100%)';
            document.getElementById('cover').style.transition = '1.5s cubic-bezier(0.8, 0, 0.2, 1)';
            document.getElementById('app').style.opacity = '1';
            if(data.logistics.music) {
                const aud = document.getElementById('bgMusic');
                aud.src = path + data.logistics.music;
                aud.play();
            }
            initReveal();
        };
    });

    function initReveal() {
        const obs = new IntersectionObserver(ents => {
            ents.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    }
</script>
</body>
</html>
