<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --theme: #8B7355; --bg: #FAF7F2; --gold: #C9A86A; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: #333; overflow-x: hidden; }
        .font-script { font-family: 'Parisienne', cursive; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .reveal { opacity: 0; transform: translateY(30px); }
        
        /* CSS Polaroid Default */
        .polaroid-frame {
            background: white;
            padding: 12px 12px 45px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 2px;
            display: inline-block;
            transition: 0.5s;
        }
        .polaroid-pria { transform: rotate(-3deg); }
        .polaroid-wanita { transform: rotate(3deg); }
        .polaroid-frame img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        .btn-main {
            background: var(--theme);
            color: white;
            padding: 12px 35px;
            border-radius: 99px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(139, 115, 85, 0.3);
        }

        /* Countdown Box */
        .cd-item { background: white; padding: 10px; border-radius: 12px; min-width: 65px; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="cover" class="fixed inset-0 z-[100] flex items-center justify-center text-center text-white">
        <img id="cover-img" class="absolute inset-0 w-full h-full object-cover" src="">
        <div class="absolute inset-0 bg-black/60"></div>
        <div class="relative z-10 px-6">
            <p id="bismillah" class="font-serif text-xl italic mb-4 hidden">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</p>
            <p class="text-[10px] tracking-[0.4em] uppercase mb-4 opacity-80">The Wedding Of</p>
            <h1 id="names-cover" class="font-script text-6xl text-gold mb-10"></h1>
            <p class="text-[10px] uppercase tracking-widest opacity-60">Kepada Yth.</p>
            <h2 id="guest-name" class="text-xl font-light mt-2 mb-10"></h2>
            <button onclick="openInvitation()" class="btn-main"><i class="fa-regular fa-envelope-open mr-2"></i> Buka Undangan</button>
        </div>
    </div>

    <div id="app" class="hidden opacity-0 max-w-md mx-auto bg-white shadow-2xl">
        
        <section class="relative h-[90vh] flex flex-col items-center justify-end pb-20 text-center text-white">
            <img id="hero-img" class="absolute inset-0 w-full h-full object-cover" src="">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
            <div class="relative z-10">
                <h2 id="names-hero" class="font-script text-6xl text-gold"></h2>
                <p id="date-hero" class="text-sm mt-4 tracking-[0.2em] font-light uppercase"></p>
            </div>
        </section>

        <section class="py-12 px-6 text-center reveal">
            <div class="flex justify-center gap-3">
                <div class="cd-item"><span id="days" class="text-xl font-bold text-[var(--theme)]">0</span><p class="text-[8px] uppercase">Hari</p></div>
                <div class="cd-item"><span id="hours" class="text-xl font-bold text-[var(--theme)]">0</span><p class="text-[8px] uppercase">Jam</p></div>
                <div class="cd-item"><span id="mins" class="text-xl font-bold text-[var(--theme)]">0</span><p class="text-[8px] uppercase">Menit</p></div>
                <div class="cd-item"><span id="secs" class="text-xl font-bold text-[var(--theme)]">0</span><p class="text-[8px] uppercase">Detik</p></div>
            </div>
        </section>

        <section class="py-20 px-8 text-center bg-[#FAF7F2]">
            <div class="reveal mb-16">
                <div class="polaroid-frame polaroid-pria w-56">
                    <img id="groom-img" src="">
                </div>
                <h3 id="groom-name" class="font-script text-4xl text-[var(--theme)] mt-8"></h3>
                <p id="groom-parents" class="text-[11px] mt-2 opacity-60"></p>
            </div>

            <div class="font-script text-5xl opacity-10 my-10">&</div>

            <div class="reveal">
                <div class="polaroid-frame polaroid-wanita w-56">
                    <img id="bride-img" src="">
                </div>
                <h3 id="bride-name" class="font-script text-4xl text-[var(--theme)] mt-8"></h3>
                <p id="bride-parents" class="text-[11px] mt-2 opacity-60"></p>
            </div>
        </section>

        <div id="dynamic-area" class="px-8 pb-20"></div>

    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('c') || 'yaya-oci';
        const path = `../../public/clients/${slug}/`;
        let weddingAudio;

        document.getElementById('guest-name').innerText = (params.get('to') || 'Tamu Undangan').replace(/\+/g, ' ');

        fetch(`${path}data.json`).then(r => r.json()).then(data => {
            // Meta & Settings
            if(data.settings.islami) document.getElementById('bismillah').classList.remove('hidden');
            if(data.settings.themeColor) document.documentElement.style.setProperty('--theme', data.settings.themeColor);

            // Names & Hero
            const pair = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
            document.getElementById('names-cover').innerText = pair;
            document.getElementById('names-hero').innerText = pair;
            document.getElementById('cover-img').src = path + data.gallery.heroImage;
            document.getElementById('hero-img').src = path + data.gallery.heroImage;
            
            const firstEvent = new Date(data.events[0].date);
            document.getElementById('date-hero').innerText = firstEvent.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            // Groom & Bride
            document.getElementById('groom-name').innerText = data.couple.groom.name;
            document.getElementById('groom-img').src = path + data.couple.groom.image;
            document.getElementById('groom-parents').innerText = `Putra dari ${data.couple.groom.father} & ${data.couple.groom.mother}`;
            
            document.getElementById('bride-name').innerText = data.couple.bride.name;
            document.getElementById('bride-img').src = path + data.couple.bride.image;
            document.getElementById('bride-parents').innerText = `Putri dari ${data.couple.bride.father} & ${data.couple.bride.mother}`;

            // Countdown Logic
            const target = new Date(`${data.events[0].date}T${data.events[0].startTime}`).getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                if(diff > 0) {
                    document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                    document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
                }
            }, 1000);

            // Injeksi Konten Sesuai Data
            let html = '';
            
            // Story
            if(data.loveStory) {
                html += `<div class="reveal mt-20 text-center">
                    <h4 class="font-serif text-3xl mb-10 text-[var(--theme)]">Our Journey</h4>
                    <div class="space-y-8 border-l-2 border-[var(--theme)]/20 ml-4 pl-6 text-left">
                        ${data.loveStory.map(s => `<div><p class="text-[10px] text-gold font-bold uppercase">${s.date}</p><h5 class="font-serif text-lg">${s.title}</h5><p class="text-xs opacity-70">${s.description}</p></div>`).join('')}
                    </div>
                </div>`;
            }

            // Events
            html += `<div class="reveal mt-20 text-center">
                <h4 class="font-serif text-3xl mb-8 text-[var(--theme)]">Acara</h4>
                ${data.events.map(e => `
                    <div class="p-8 rounded-3xl bg-[#FAF7F2] border border-black/5 mb-6">
                        <h5 class="font-serif text-2xl text-[var(--theme)] mb-2">${e.title}</h5>
                        <p class="text-xs font-bold">${e.date}</p>
                        <p class="text-[10px] opacity-60 mb-4">${e.startTime} - ${e.endTime} ${e.timezone}</p>
                        <p class="text-[11px] mb-4">${e.address}</p>
                        <a href="${e.googleMaps}" target="_blank" class="btn-main text-[9px] inline-block">Buka Maps</a>
                    </div>
                `).join('')}
            </div>`;

            // Gift
            if(data.digitalGift) {
                html += `<div class="reveal mt-20 text-center">
                    <h4 class="font-serif text-3xl mb-8 text-[var(--theme)]">Digital Gift</h4>
                    ${data.digitalGift.map(g => `
                        <div class="p-6 bg-[#FAF7F2] rounded-2xl mb-4 border-dashed border-2 border-[var(--theme)]/20">
                            <p class="text-xs font-bold text-gold uppercase">${g.provider}</p>
                            <p class="text-xl font-serif tracking-widest my-1">${g.accountNumber}</p>
                            <p class="text-[10px] opacity-50 uppercase">a.n ${g.accountHolder}</p>
                        </div>
                    `).join('')}
                </div>`;
            }

            document.getElementById('dynamic-area').innerHTML = html;
            weddingAudio = new Audio(path + data.logistics.music);
        });

        function openInvitation() {
            if(weddingAudio) { weddingAudio.play(); weddingAudio.loop = true; }
            gsap.to('#cover', { y: '-100%', duration: 1.2, ease: 'power4.inOut', onComplete: () => {
                document.getElementById('cover').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                gsap.to('#app', { opacity: 1, duration: 1 });
                gsap.utils.toArray('.reveal').forEach(el => {
                    gsap.to(el, { opacity: 1, y: 0, duration: 1, scrollTrigger: { trigger: el, start: 'top 90%' } });
                });
            }});
        }
    </script>
</body>
</html>
