<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omah Aksara — Private Editorial Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Inter:wght@100;300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --luxe-gold: #b39359; 
            --deep-mocca: #1a1715;
            --soft-cream: #fcfbf7;
            --muted-gold: #d4c3a1;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--soft-cream); 
            color: var(--deep-mocca);
            overflow-x: hidden;
        }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Editorial Frame - Thinner & More Elegant */
        .editorial-frame {
            position: fixed; inset: 0;
            border: 25px solid var(--soft-cream);
            pointer-events: none; z-index: 100;
        }
        .inner-line {
            position: fixed; inset: 40px;
            border: 0.5px solid rgba(179, 147, 89, 0.2);
            pointer-events: none; z-index: 101;
        }

        /* Luxury Typography */
        .char { display: inline-block; transform: translateY(100%); }
        .stagger-text { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }

        /* Custom Section */
        .section-padding { padding: 120px 24px; }
        
        /* Image Reveal Mask */
        .img-reveal-wrapper {
            position: relative; overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
            transition: clip-path 1.5s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .img-reveal-wrapper.active { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }

        .luxe-btn {
            position: relative; overflow: hidden;
            border: 1px solid var(--luxe-gold);
            padding: 18px 48px; font-size: 10px; letter-spacing: 0.5em;
            text-transform: uppercase; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .luxe-btn:hover { background: var(--luxe-gold); color: white; letter-spacing: 0.7em; }

        /* Grain Effect for Texture */
        .grain {
            position: fixed; inset: 0; z-index: 200;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_filmgrain.png");
            opacity: 0.03; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="grain"></div>
    <div class="editorial-frame"></div>
    <div class="inner-line"></div>

    <!-- PRELOADER / COVER -->
    <section id="cover" class="flex-col h-screen text-center justify-center bg-[#fcfbf7] z-[150] fixed inset-0">
        <div class="reveal-wrapper mb-10">
            <h2 class="font-serif italic text-2xl opacity-60">The Private Invitation</h2>
        </div>
        <div class="w-[1px] h-24 bg-luxe-gold/30 mx-auto my-8"></div>
        <h1 id="couple-title" class="text-7xl md:text-8xl font-serif mb-12 tracking-tighter"></h1>
        <div class="mt-4">
            <button onclick="startExperience()" class="luxe-btn">Enter Gallery</button>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <div id="main-content" class="opacity-0 transition-opacity duration-1000">
        
        <!-- HERO SECTION -->
        <section class="min-h-screen pt-32 flex-col">
            <div class="img-reveal-wrapper w-full max-w-lg mx-auto" id="hero-reveal">
                <img id="main-photo" src="" class="w-full h-[70vh] object-cover contrast-[1.1] brightness-[0.9]">
            </div>
            <div class="text-center mt-12 px-6 reveal-up">
                <p class="text-[10px] tracking-[0.8em] uppercase opacity-40 mb-4">Volume I — Eternal Union</p>
                <p id="hero-date" class="font-serif italic text-3xl"></p>
            </div>
        </section>

        <!-- QUOTE SECTION -->
        <section class="bg-white section-padding">
            <div class="max-w-3xl mx-auto text-center px-10">
                <div class="w-12 h-[1px] bg-luxe-gold mx-auto mb-12"></div>
                <p id="arab-text" class="text-4xl font-serif mb-10 text-luxe-gold leading-relaxed"></p>
                <p id="indo-text" class="text-xl italic font-serif leading-relaxed opacity-70 px-4 md:px-20"></p>
                <div class="w-12 h-[1px] bg-luxe-gold mx-auto mt-12"></div>
            </div>
        </section>

        <!-- GROOM SECTION -->
        <section class="grid grid-cols-1 md:grid-cols-12 gap-0 items-center">
            <div class="md:col-span-7 h-[80vh] overflow-hidden">
                <img id="pria-foto" src="" class="w-full h-full object-cover parallax-bg grayscale hover:grayscale-0 transition-all duration-[2s]">
            </div>
            <div class="md:col-span-5 p-16 md:p-24">
                <span class="text-[9px] tracking-[0.6em] uppercase text-luxe-gold block mb-6">Gentleman</span>
                <h3 id="pria-nama" class="text-6xl font-serif mb-8 leading-tight"></h3>
                <p id="pria-ortu" class="text-sm opacity-50 font-light leading-loose tracking-widest uppercase text-[10px]"></p>
            </div>
        </section>

        <!-- BRIDE SECTION -->
        <section class="grid grid-cols-1 md:grid-cols-12 gap-0 items-center bg-[#1a1715] text-[#fcfbf7]">
            <div class="md:col-span-5 p-16 md:p-24 order-2 md:order-1">
                <span class="text-[9px] tracking-[0.6em] uppercase text-muted-gold block mb-6">The Lady</span>
                <h3 id="wanita-nama" class="text-6xl font-serif mb-8 leading-tight"></h3>
                <p id="wanita-ortu" class="text-sm opacity-50 font-light leading-loose tracking-widest uppercase text-[10px]"></p>
            </div>
            <div class="md:col-span-7 h-[80vh] overflow-hidden order-1 md:order-2">
                <img id="wanita-foto" src="" class="w-full h-full object-cover parallax-bg contrast-[1.1]">
            </div>
        </section>

        <!-- EVENT SECTION -->
        <section class="section-padding bg-white">
            <div class="text-center mb-24">
                <h2 class="text-[10px] tracking-[1em] uppercase opacity-40">The Itinerary</h2>
            </div>
            <div id="event-list" class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-20 px-10">
                <!-- Data from JSON -->
            </div>
        </section>

        <!-- FOOTER -->
        <footer class="section-padding text-center bg-white border-t border-gray-100">
            <h2 id="footer-names" class="text-8xl font-serif italic mb-16 tracking-tighter opacity-80"></h2>
            <div class="flex justify-center gap-8 mb-20 opacity-60">
                <div class="w-px h-12 bg-luxe-gold"></div>
            </div>
            <p class="text-[9px] tracking-[0.8em] opacity-30 uppercase">Private Collection by Omah Aksara</p>
        </footer>
    </div>

    <audio id="audio" loop preloade="auto"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('c') || 'budi-ani';
        const path = `../../public/clients/${slug}/`;

        fetch(`${path}data.json`).then(res => res.json()).then(data => {
            // Setup Names
            const groomNick = data.mempelai.pria.panggilan;
            const brideNick = data.mempelai.wanita.panggilan;
            document.getElementById('couple-title').innerHTML = `${groomNick} <span class="text-3xl italic mx-2">&</span> ${brideNick}`;
            document.getElementById('footer-names').innerHTML = `${groomNick} <span class="text-4xl">/</span> ${brideNick}`;
            
            // Assets
            document.getElementById('main-photo').src = path + data.galeri.cover;
            document.getElementById('hero-date').textContent = data.acara[0].tanggal;
            document.getElementById('pria-foto').src = path + data.mempelai.pria.foto;
            document.getElementById('wanita-foto').src = path + data.mempelai.wanita.foto;
            document.getElementById('audio').src = path + data.info.music;

            // Religi
            document.getElementById('arab-text').textContent = data.content_religius.quote_arab;
            document.getElementById('indo-text').textContent = data.content_religius.quote_indo;

            // Details
            document.getElementById('pria-nama').textContent = data.mempelai.pria.nama;
            document.getElementById('pria-ortu').textContent = `First born son of Mr. ${data.mempelai.pria.ayah} & Mrs. ${data.mempelai.pria.ibu}`;
            document.getElementById('wanita-nama').textContent = data.mempelai.wanita.nama;
            document.getElementById('wanita-ortu').textContent = `The daughter of Mr. ${data.mempelai.wanita.ayah} & Mrs. ${data.mempelai.wanita.ibu}`;

            // Events with Editorial Style
            data.acara.forEach((e, i) => {
                document.getElementById('event-list').innerHTML += `
                    <div class="reveal-up border-b border-gray-100 pb-12">
                        <span class="text-[9px] text-luxe-gold font-bold tracking-[0.4em] uppercase">0${i+1} — ${e.label}</span>
                        <h4 class="text-4xl font-serif mt-6 mb-2">${e.tanggal}</h4>
                        <p class="text-sm italic opacity-60 mb-8 font-serif">${e.waktu}</p>
                        <p class="text-[11px] leading-relaxed tracking-[0.2em] uppercase font-semibold">${e.lokasi}</p>
                    </div>`;
            });
        });

        function startExperience() {
            const audio = document.getElementById('audio');
            audio.volume = 0.5;
            audio.play();

            // Luxury Transition
            gsap.to("#cover", { 
                y: "-100%", 
                duration: 2, 
                ease: "expo.inOut",
                onComplete: () => {
                    document.getElementById('cover').style.display = 'none';
                    document.getElementById('main-content').classList.remove('opacity-0');
                    document.getElementById('hero-reveal').classList.add('active');
                    initLuxuryAnimations();
                }
            });
        }

        function initLuxuryAnimations() {
            gsap.registerPlugin(ScrollTrigger);
            
            // Subtle Reveal for Text
            gsap.utils.toArray(".reveal-up").forEach(el => {
                gsap.fromTo(el, 
                    { opacity: 0, y: 30 },
                    { 
                        scrollTrigger: { trigger: el, start: "top 90%" },
                        opacity: 1, y: 0, duration: 1.8, ease: "power2.out"
                    }
                );
            });

            // Parallax with Zoom Effect
            gsap.utils.toArray(".parallax-bg").forEach(img => {
                gsap.to(img, {
                    scrollTrigger: { trigger: img, scrub: 1.5 },
                    scale: 1.15,
                    y: -20
                });
            });
        }
    </script>
</body>
</html>
