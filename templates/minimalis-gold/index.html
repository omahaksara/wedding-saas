<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        :root {
            --gold: #C5A572;
            --bg: #0F0F0F;
            --bg-soft: #1A1A1A;
            --text: #EAEAEA;
            --text-muted: #888;
            --border: #222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
            overflow-x: hidden;
        }
     .container { max-width: 500px; margin: 0 auto; background: var(--bg); }
     .cover {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            background-size: cover;
            background-position: center;
        }
     .cover::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(15,15,15,0.2) 0%, var(--bg) 95%);
        }
     .cover-content { position: relative; z-index: 2; padding: 20px; }
     .cover.to { font-size: 0.9rem; letter-spacing: 2px; color: var(--text-muted); }
     .cover.guest-name { font-size: 1.5rem; margin: 10px 0 30px; font-weight: 500; }
     .cover h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.8rem;
            color: var(--gold);
            line-height: 1.1;
            font-weight: 600;
        }
     .cover.date { margin: 30px 0; letter-spacing: 3px; }
     .btn {
            display: inline-block;
            background: var(--gold);
            color: var(--bg);
            padding: 14px 32px;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 1px;
            border: 1px solid var(--gold);
            transition: all 0.3s ease;
            cursor: pointer;
        }
     .btn:hover { background: transparent; color: var(--gold); }
        section { padding: 80px 24px; text-align: center; }
     .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 40px;
            font-weight: 600;
        }
        
        /* COUPLE UPGRADE - GAK FLAT LAGI */
     .couple-grid { display: grid; gap: 60px; }
     .couple-item {
            background: var(--bg-soft);
            border: 1px solid var(--border);
            padding: 24px 24px 32px;
            position: relative;
        }
     .couple-item::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 1px solid var(--gold);
            opacity: 0.3;
            pointer-events: none;
        }
     .couple-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            filter: grayscale(10%);
            margin-bottom: 20px;
        }
     .couple-item h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            color: var(--gold);
            margin-bottom: 8px;
        }
     .couple-item p { color: var(--text-muted); font-size: 0.95rem; }
     .couple-item a { color: var(--gold); text-decoration: none; font-weight: 500; }
        
     .event-card,.story-card,.gift-box,.logistics-box {
            background: var(--bg-soft);
            border: 1px solid var(--border);
            padding: 32px;
            margin-bottom: 24px;
            text-align: left;
        }
     .event-card h3,.story-card h3 { color: var(--gold); font-size: 1.5rem; margin-bottom: 16px; }
     .event-card p,.story-card p,.logistics-box p { color: var(--text-muted); margin-bottom: 8px; }
     .event-card.btn { margin-top: 16px; padding: 10px 24px; font-size: 0.9rem; }
     .story-card span { color: var(--gold); font-weight: 600; }

        /* GALLERY SLIDER - AUTO GESER */
     .gallery-slider { width: 100%; padding-bottom: 40px; }
     .swiper-slide { width: 85%; height: 450px; }
     .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
     .swiper-pagination-bullet { background: var(--text-muted); opacity: 1; }
     .swiper-pagination-bullet-active { background: var(--gold); }
        
     .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin-top: 24px; }
     .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
     .gift-box img { max-width: 200px; margin: 20px auto; display: block; }
     .footer { padding: 60px 24px; font-size: 0.9rem; color: var(--text-muted); }
     .music-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 999;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--gold); color: var(--bg); border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 20px rgba(197,165,114,0.3);
        }
     .hidden { display: none!important; }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 1000; }
    </style>
</head>
<body>
    <div id="loader" class="cover">
        <div class="cover-content"><p>Loading...</p></div>
    </div>

    <main id="main" class="container hidden">
        <section id="cover" class="cover">
            <div class="cover-content">
                <p class="to">Kepada Yth.</p>
                <p class="guest-name" id="guestName">Tamu Undangan</p>
                <h1 id="coupleName"></h1>
                <p class="date" id="weddingDate"></p>
                <a href="#couple" class="btn" id="openBtn">Buka Undangan</a>
            </div>
        </section>

        <section id="couple">
            <h2 class="section-title">Mempelai</h2>
            <div class="couple-grid">
                <div class="couple-item">
                    <img id="groomImg" src="" alt="Mempelai Pria">
                    <h3 id="groomName"></h3>
                    <p id="groomParents"></p>
                    <p><a id="groomIg" href="" target="_blank"></a></p>
                </div>
                <div class="couple-item">
                    <img id="brideImg" src="" alt="Mempelai Wanita">
                    <h3 id="brideName"></h3>
                    <p id="brideParents"></p>
                    <p><a id="brideIg" href="" target="_blank"></a></p>
                </div>
            </div>
        </section>

        <section id="events" style="background: var(--bg-soft);">
            <h2 class="section-title">Save The Date</h2>
            <div id="eventList"></div>
        </section>

        <section id="loveStory" class="hidden">
            <h2 class="section-title">Perjalanan Cinta</h2>
            <div id="storyList"></div>
        </section>

        <section id="gallery">
            <h2 class="section-title">Momen Bahagia</h2>
            <div class="swiper gallery-slider">
                <div class="swiper-wrapper" id="galleryWrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </section>

        <section id="video" class="hidden" style="background: var(--bg-soft);">
            <h2 class="section-title">Video Kami</h2>
            <div class="video-wrapper" id="videoWrapper"></div>
        </section>

        <section id="gift" class="hidden">
            <h2 class="section-title">Wedding Gift</h2>
            <div id="giftList"></div>
        </section>

        <section id="logistics" class="hidden" style="background: var(--bg-soft);">
            <h2 class="section-title">Informasi Acara</h2>
            <div class="logistics-box" id="logisticsBox"></div>
        </section>

        <section class="footer">
            <p>Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir untuk memberikan doa restu.</p>
            <p style="margin-top: 20px; color: var(--gold);" id="footerCouple"></p>
        </section>
    </main>

    <button id="musicBtn" class="music-btn hidden">♫</button>
    <audio id="bgMusic" loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const clientSlug = urlParams.get('c');
        const guestName = urlParams.get('to') || 'Tamu Undangan';
        const basePath = `../../public/clients/${clientSlug}/`;

        fetch(`${basePath}data.json`)
      .then(res => {
            if (!res.ok) throw new Error('Data not found');
            return res.json();
        })
      .then(data => {
            // 1. Meta & Theme
            if (data.meta?.theme_color) {
                document.documentElement.style.setProperty('--gold', data.meta.theme_color);
            }
            document.title = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;

            // 2. Cover
            document.getElementById('guestName').textContent = guestName;
            document.getElementById('coupleName').textContent = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
            document.getElementById('cover').style.backgroundImage = `url('${basePath}${data.gallery.heroImage}')`;
            const eventDate = new Date(data.events[0].date);
            document.getElementById('weddingDate').textContent = eventDate.toLocaleDateString('id-ID', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
            });

            // 3. Couple
            document.getElementById('groomImg').src = basePath + data.couple.groom.image;
            document.getElementById('groomName').textContent = data.couple.groom.name;
            document.getElementById('groomParents').textContent = `Putra dari ${data.couple.groom.father} & ${data.couple.groom.mother}`;
            if (data.couple.groom.instagram) {
                const groomIg = document.getElementById('groomIg');
                groomIg.textContent = data.couple.groom.instagram;
                groomIg.href = `https://instagram.com/${data.couple.groom.instagram.replace('@', '')}`;
            }

            document.getElementById('brideImg').src = basePath + data.couple.bride.image;
            document.getElementById('brideName').textContent = data.couple.bride.name;
            document.getElementById('brideParents').textContent = `Putri dari ${data.couple.bride.father} & ${data.couple.bride.mother}`;
            if (data.couple.bride.instagram) {
                const brideIg = document.getElementById('brideIg');
                brideIg.textContent = data.couple.bride.instagram;
                brideIg.href = `https://instagram.com/${data.couple.bride.instagram.replace('@', '')}`;
            }

            // 4. Events
            const eventList = document.getElementById('eventList');
            data.events.forEach(ev => {
                const date = new Date(ev.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
                eventList.innerHTML += `
                    <div class="event-card">
                        <h3>${ev.title}</h3>
                        <p><strong>${date}</strong></p>
                        <p>Pukul ${ev.startTime} - ${ev.endTime} ${ev.timezone}</p>
                        <p>${ev.address}</p>
                        ${ev.googleMaps? `<a href="${ev.googleMaps}" target="_blank" class="btn">Lihat Lokasi</a>` : ''}
                    </div>
                `;
            });

            // 5. Love Story
            if (data.loveStory && data.loveStory.length > 0) {
                document.getElementById('loveStory').classList.remove('hidden');
                const storyList = document.getElementById('storyList');
                data.loveStory.forEach(story => {
                    storyList.innerHTML += `
                        <div class="story-card">
                            <h3><span>${story.year}</span> - ${story.title}</h3>
                            <p>${story.desc}</p>
                        </div>
                    `;
                });
            }

            // 6. Gallery Slider - AUTO GESER
            const galleryWrapper = document.getElementById('galleryWrapper');
            if (data.gallery.album && data.gallery.album.length > 0) {
                data.gallery.album.forEach(img => {
                    galleryWrapper.innerHTML += `<div class="swiper-slide"><img src="${basePath}${img}" alt="Gallery"></div>`;
                });
                new Swiper('.gallery-slider', {
                    effect: 'coverflow',
                    grabCursor: true,
                    centeredSlides: true,
                    slidesPerView: 'auto',
                    loop: true,
                    autoplay: {
                        delay: 3000,
                        disableOnInteraction: false,
                    },
                    coverflowEffect: {
                        rotate: 0,
                        stretch: 0,
                        depth: 100,
                        modifier: 2,
                        slideShadows: false,
                    },
                    pagination: {
                        el: '.swiper-pagination',
                        clickable: true,
                    },
                });
            } else {
                document.getElementById('gallery').classList.add('hidden');
            }

            // 7. Video YouTube
            if (data.gallery.videoYoutubeId) {
                document.getElementById('video').classList.remove('hidden');
                document.getElementById('videoWrapper').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${data.gallery.videoYoutubeId}" 
                            title="YouTube video" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen></iframe>
                `;
            }

            // 8. Gift
            if (data.digitalGift && data.digitalGift.length > 0) {
                document.getElementById('gift').classList.remove('hidden');
                const giftList = document.getElementById('giftList');
                data.digitalGift.forEach(gift => {
                    giftList.innerHTML += `
                        <div class="gift-box">
                            <h3>${gift.provider}</h3>
                            <p style="font-size: 1.2rem; letter-spacing: 2px; margin: 10px 0;">${gift.accountNumber}</p>
                            <p>a.n ${gift.accountHolder}</p>
                            ${gift.qrCode? `<img src="${basePath}${gift.qrCode}" alt="QR Code">` : ''}
                        </div>
                    `;
                });
            }

            // 9. Logistics
            if (data.logistics && (data.logistics.dressCode || data.logistics.rsvpWaNumber || data.logistics.guestNote)) {
                document.getElementById('logistics').classList.remove('hidden');
                const logisticsBox = document.getElementById('logisticsBox');
                let logisticsHTML = '';
                if (data.logistics.dressCode) logisticsHTML += `<p><strong>Dress Code:</strong> ${data.logistics.dressCode}</p>`;
                if (data.logistics.guestNote) logisticsHTML += `<p><strong>Catatan:</strong> ${data.logistics.guestNote}</p>`;
                if (data.logistics.rsvpWaNumber) {
                    const waLink = `https://wa.me/${data.logistics.rsvpWaNumber}?text=Halo, saya ${guestName} ingin konfirmasi kehadiran untuk acara ${data.couple.groom.nickname} %26 ${data.couple.bride.nickname}`;
                    logisticsHTML += `<a href="${waLink}" target="_blank" class="btn" style="margin-top: 16px;">Konfirmasi via WhatsApp</a>`;
                }
                logisticsBox.innerHTML = logisticsHTML;
            }

            // 10. Music
            if (data.config?.audioUrl) {
                const audio = document.getElementById('bgMusic');
                const musicBtn = document.getElementById('musicBtn');
                audio.src = basePath + data.config.audioUrl;
                musicBtn.classList.remove('hidden');
                let isPlaying = false;
                musicBtn.onclick = () => {
                    if (isPlaying) { audio.pause(); musicBtn.textContent = '♫'; }
                    else { audio.play(); musicBtn.textContent = '❚❚'; }
                    isPlaying =!isPlaying;
                };
                document.getElementById('openBtn').addEventListener('click', () => {
                    audio.play().then(() => { isPlaying = true; musicBtn.textContent = '❚❚'; }).catch(e => {});
                });
            }

            document.getElementById('footerCouple').textContent = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
        })
      .catch(err => {
            document.getElementById('loader').innerHTML = '<div class="cover-content"><p>Gagal memuat data. Cek link atau data.json</p></div>';
            console.error(err);
        });
    </script>
</body>
</html>
