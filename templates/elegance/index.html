<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation — Elegance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --theme: #8B7355; --bg: #FAF7F2; --text: #3E3E3E; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .font-script { font-family: 'Parisienne', cursive; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .reveal { opacity: 0; transform: translateY(30px); }
        .btn-luxe { background: var(--theme); color: white; padding: 12px 30px; border-radius: 99px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .img-frame { width: 180px; height: 180px; object-fit: cover; border-radius: 50%; border: 5px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="cover" class="fixed inset-0 z-[100] flex flex-col items-center justify-center text-center text-white">
        <img id="coverImg" class="absolute inset-0 w-full h-full object-cover" src="">
        <div class="absolute inset-0 bg-black/50"></div>
        <div class="relative z-10 px-6">
            <p id="bismillah" class="font-serif italic text-xl mb-4 hidden">Bismillahirrahmannirraheem</p>
            <h1 id="coverNames" class="font-script text-6xl md:text-8xl text-[#C9A86A] mb-8"></h1>
            <p class="text-xs uppercase tracking-widest mb-2">Kepada Yth.</p>
            <h3 id="guestTo" class="text-xl font-bold mb-8"></h3>
            <button onclick="startApp()" class="btn-luxe"><i class="fa-regular fa-envelope-open mr-2"></i> Buka Undangan</button>
        </div>
    </div>

    <main id="app" class="hidden opacity-0 max-w-md mx-auto shadow-2xl bg-white">
        <section class="relative h-[80vh] flex flex-col items-center justify-center text-center text-white">
            <img id="heroImg" class="absolute inset-0 w-full h-full object-cover" src="">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
            <div class="relative z-10">
                <h2 id="heroNames" class="font-script text-6xl text-[#C9A86A]"></h2>
                <p id="heroDate" class="text-sm mt-4 tracking-widest uppercase"></p>
            </div>
        </section>

        <section class="py-20 px-8 text-center bg-[#FAF7F2]">
            <p id="qArab" class="text-2xl font-serif text-[#8B7355] mb-6"></p>
            <p id="qText" class="text-sm italic opacity-70 leading-relaxed mb-4"></p>
            <p id="qSource" class="text-[10px] font-bold tracking-widest uppercase opacity-40"></p>
        </section>

        <section class="py-20 px-8 text-center space-y-16">
            <div class="reveal">
                <img id="gImg" src="" class="img-frame mx-auto mb-6">
                <h3 id="gName" class="font-script text-4xl text-[#8B7355]"></h3>
                <p id="gParents" class="text-[11px] mt-2 opacity-60"></p>
            </div>
            <div class="font-script text-5xl opacity-20">&</div>
            <div class="reveal">
                <img id="bImg" src="" class="img-frame mx-auto mb-6">
                <h3 id="bName" class="font-script text-4xl text-[#8B7355]"></h3>
                <p id="bParents" class="text-[11px] mt-2 opacity-60"></p>
            </div>
        </section>

        <section class="py-20 px-8 bg-[#8B7355] text-white text-center">
            <h2 class="font-serif text-3xl mb-10">Rangkaian Acara</h2>
            <div id="eventList" class="space-y-8"></div>
        </section>

        <section class="py-20 px-8 text-center bg-white">
            <h2 class="font-serif text-3xl mb-4">Kado Digital</h2>
            <p class="text-[11px] opacity-60 mb-8">Doa restu Anda sudah lebih dari cukup, namun jika ingin memberi tanda kasih:</p>
            <div id="giftList" class="space-y-4"></div>
        </section>

        <footer class="py-12 text-center bg-[#FAF7F2] opacity-50 text-[10px] tracking-widest">
            DESIGN BY OMAH AKSARA
        </footer>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('c') || 'budi-ani';
        const path = `../../public/clients/${slug}/`;
        let audio = null;

        document.getElementById('guestTo').innerText = (params.get('to') || 'Tamu Undangan').replace(/\+/g, ' ');

        fetch(`${path}data.json`).then(r => r.json()).then(data => {
            // Settings
            if(data.settings.islami) document.getElementById('bismillah').classList.remove('hidden');
            
            // Names & Images
            const pair = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
            document.getElementById('coverNames').innerText = pair;
            document.getElementById('heroNames').innerText = pair;
            document.getElementById('coverImg').src = path + data.gallery.heroImage;
            document.getElementById('heroImg').src = path + data.gallery.heroImage;
            
            // Groom & Bride
            document.getElementById('gName').innerText = data.couple.groom.name;
            document.getElementById('gImg').src = path + data.couple.groom.image;
            document.getElementById('gParents').innerText = `Putra dari ${data.couple.groom.father} & ${data.couple.groom.mother}`;
            
            document.getElementById('bName').innerText = data.couple.bride.name;
            document.getElementById('bImg').src = path + data.couple.bride.image;
            document.getElementById('bParents').innerText = `Putri dari ${data.couple.bride.father} & ${data.couple.bride.mother}`;

            // Quote
            document.getElementById('qArab').innerText = data.quote.arab;
            document.getElementById('qText').innerText = `"${data.quote.text}"`;
            document.getElementById('qSource').innerText = data.quote.source;

            // Events
            data.events.forEach(ev => {
                document.getElementById('eventList').innerHTML += `
                    <div class="border border-white/20 p-6 rounded-2xl">
                        <h4 class="font-serif text-2xl mb-2">${ev.title}</h4>
                        <p class="text-sm font-bold">${ev.date}</p>
                        <p class="text-xs opacity-80">${ev.startTime} - ${ev.endTime} ${ev.timezone}</p>
                        <p class="text-[10px] mt-4 uppercase tracking-wider">${ev.address}</p>
                    </div>
                `;
            });

            // Gifts
            data.digitalGift.forEach(g => {
                document.getElementById('giftList').innerHTML += `
                    <div class="bg-[#FAF7F2] p-6 rounded-2xl border border-black/5">
                        <p class="text-xs font-bold text-[#8B7355]">${g.provider}</p>
                        <p class="text-xl font-serif my-2">${g.accountNumber}</p>
                        <p class="text-[10px] opacity-50 uppercase">a.n ${g.accountHolder}</p>
                    </div>
                `;
            });

            audio = new Audio(path + data.logistics.music);
        });

        function startApp() {
            if(audio) audio.play();
            gsap.to("#cover", { y: "-100%", duration: 1.2, ease: "power4.inOut", onComplete: () => {
                document.getElementById('cover').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                gsap.to("#app", { opacity: 1, duration: 1 });
                initScroll();
            }});
        }

        function initScroll() {
            gsap.registerPlugin(ScrollTrigger);
            gsap.utils.toArray(".reveal").forEach(el => {
                gsap.to(el, { opacity: 1, y: 0, duration: 1, scrollTrigger: { trigger: el, start: "top 90%" } });
            });
        }
    </script>
</body>
</html>
