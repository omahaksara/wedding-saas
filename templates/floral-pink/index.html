<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--theme-color:#FF8DA1;--bg-color:#FFEAF1;--text-color:#6D5A5E}
body{font-family:'Montserrat',sans-serif;background:var(--bg-color);color:var(--text-color)}
.font-serif{font-family:'Cormorant Garamond',serif}.font-arab{font-family:'Scheherazade New',serif}
.bg-theme{background:var(--theme-color)}.text-theme{color:var(--theme-color)}.border-theme{border-color:var(--theme-color)}
.cover-bg{background:var(--bg-color)}.polaroid{background:white;padding:10px 10px 35px;box-shadow:0 6px 15px rgba(0,0,0,.1)}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="cover" class="fixed inset-0 z-50 flex flex-col items-center justify-center text-center text-white cover-bg">
<img id="cover-image" class="absolute inset-0 w-full h-full object-cover" crossorigin="anonymous" onerror="this.style.display='none'">
<div class="absolute inset-0 backdrop-blur-sm bg-gradient-to-t from-black/70 via-black/30 to-white/10"></div>
<div class="relative z-10 p-8">
<p id="cover-bismillah" class="font-arab text-3xl mb-4 hidden">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</p>
<p id="cover-event-name" class="text-sm tracking-widest uppercase">THE WEDDING</p>
<h1 id="cover-names" class="font-serif text-6xl my-4"></h1>
<p class="text-sm mt-8">Kepada Yth.</p>
<p id="cover-guest" class="text-xl font-semibold"></p>
<button id="open-invitation" class="bg-white/20 backdrop-blur border border-white rounded-full px-8 py-3 mt-8 text-sm uppercase">Buka Undangan</button>
</div></div>

<div id="app" class="max-w-md mx-auto min-h-screen opacity-0">
<section id="hero" class="relative h-screen flex items-end justify-center text-center text-white">
<img id="hero-image" class="absolute inset-0 w-full h-full object-cover" crossorigin="anonymous" onerror="this.parentElement.style.background='var(--bg-color)'">
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
<div class="relative z-10 p-8"><p>PERNIKAHAN</p><h1 id="hero-names" class="font-serif text-6xl my-2"></h1><p id="hero-date"></p></div>
</section>

<div class="p-8 text-center">
<section id="quote-section" class="my-12 bg-white/60 p-6 rounded-2xl hidden"><p id="quote-arab" class="font-arab text-2xl text-theme hidden"></p><p id="quote-text" class="italic mt-4"></p><p id="quote-source" class="text-xs mt-2"></p></section>

<section class="my-12"><div id="groom-section"></div><div class="font-serif text-5xl my-4 text-theme">&</div><div id="bride-section"></div></section>

<section id="event-section" class="my-16 bg-white/60 p-6 rounded-2xl hidden"><h3 class="font-serif text-3xl mb-6 text-theme">Save The Date</h3><div id="event-details"></div><div id="countdown-wrap" class="mt-8 hidden"><div id="countdown" class="flex justify-center space-x-4"></div></div></section>

<section id="gallery-section" class="my-16 hidden"><h3 class="font-serif text-3xl mb-6 text-theme">Momen Bahagia</h3><div id="gallery-grid" class="grid gap-4"></div></section>

<section id="gift-section" class="my-16 bg-white/60 p-6 rounded-2xl hidden"><h3 class="font-serif text-3xl mb-4 text-theme">Amplop Digital</h3><div id="gift-details"></div></section>

<section id="rsvp-section" class="my-16 hidden"><a id="rsvp-link" class="bg-theme text-white rounded-full px-8 py-3 uppercase">Konfirmasi WA</a></section>

<footer class="py-8"><p id="footer-closing" class="font-arab text-2xl text-theme hidden"></p><p class="font-serif text-2xl mt-6 text-theme">Terima Kasih</p><p id="footer-names" class="font-serif text-3xl mt-2 text-theme"></p></footer>

<!-- WATERMARK -->
<div class="text-center pb-6"><a href="https://lynk.id/ondow/page/jasa-edit" target="_blank" class="text- text-gray-400 hover:text-theme tracking-widest uppercase">Aksara invitation</a></div>
</div></div>

<script>
const params=new URLSearchParams(location.search);const c=params.get('c');const to=params.get('to')||'Tamu Undangan';const base=`../../public/clients/${c}/`;
fetch(base+'data.json').then(r=>r.json()).then(d=>{
const g=d.couple.groom,b=d.couple.bride,ev=d.events[0],s=d.settings||{};
if(s.themeColor)document.documentElement.style.setProperty('--theme-color',s.themeColor);
const rel=s.religion||'umum';const txt={islam:{e:"WALIMATUL 'URSY",b:true},kristen:{e:"HOLY MATRIMONY",b:false},hindu:{e:"PAWIWAHAN",b:false},umum:{e:"THE WEDDING",b:false}}[rel];
document.getElementById('cover-event-name').textContent=txt.e;if(txt.b){document.getElementById('cover-bismillah').classList.remove('hidden');document.getElementById('footer-closing').classList.remove('hidden')}

if(d.gallery.heroImage){document.getElementById('cover-image').src=base+d.gallery.heroImage;document.getElementById('hero-image').src=base+d.gallery.heroImage}
document.getElementById('cover-names').textContent=`${g.nickname} & ${b.nickname}`;document.getElementById('cover-guest').textContent=to.replace(/\+/g,' ');
document.getElementById('hero-names').textContent=`${g.nickname} & ${b.nickname}`;document.getElementById('hero-date').textContent=new Date(ev.date).toLocaleDateString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

if(d.quote?.text){document.getElementById('quote-section').classList.remove('hidden');if(d.quote.arab){document.getElementById('quote-arab').classList.remove('hidden');document.getElementById('quote-arab').textContent=d.quote.arab}document.getElementById('quote-text').textContent=`"${d.quote.text}"`;document.getElementById('quote-source').textContent=d.quote.source}

const render=(p,el)=>{document.getElementById(el).innerHTML=`<div class="polaroid w-48 mx-auto"><img src="${base+p.image}" class="w-full aspect-[3/4] object-cover" onerror="this.src='../../public/default-avatar.jpg'"></div><h2 class="font-serif text-4xl mt-4 text-theme">${p.name}</h2><p class="text-sm">${p.father} & ${p.mother}</p>`};
render(g,'groom-section');render(b,'bride-section');

if(d.events?.length){document.getElementById('event-section').classList.remove('hidden');const ed=document.getElementById('event-details');d.events.forEach(e=>ed.innerHTML+=`<div class="border-t border-theme/20 pt-4 first:border-0"><h4 class="uppercase text-sm">${e.title}</h4><p>${new Date(e.date).toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'})}</p><p>${e.startTime} WIB</p></div>`);document.getElementById('countdown-wrap').classList.remove('hidden');const cd=new Date(`${ev.date}T${ev.startTime}`).getTime();setInterval(()=>{const d=Math.floor((cd-Date.now())/(1000*60*60*24));document.getElementById('countdown').innerHTML=`<div><div class="text-2xl font-serif">${d}</div><div class="text-xs">Hari</div></div>`},1000)}

if(d.gallery.album?.length){document.getElementById('gallery-section').classList.remove('hidden');const gg=document.getElementById('gallery-grid');gg.className=`grid ${d.gallery.album.length===1?'grid-cols-1':'grid-cols-2'} gap-4`;d.gallery.album.forEach(i=>gg.innerHTML+=`<div class="polaroid"><img src="${base+i}" class="aspect-square object-cover"></div>`)}

if(d.digitalGift?.length){document.getElementById('gift-section').classList.remove('hidden');const gd=document.getElementById('gift-details');d.digitalGift.forEach(gf=>gd.innerHTML+=`<div class="bg-white p-3 rounded-lg my-2"><p class="font-bold">${gf.provider}</p><p>${gf.accountNumber}</p><p class="text-xs">a.n ${gf.accountHolder}</p></div>`)}

document.getElementById('rsvp-link').href=`https://wa.me/${d.logistics.rsvpWaNumber}?text=Halo saya ${to}`;
document.getElementById('footer-names').textContent=`${g.nickname} & ${b.nickname}`;
document.getElementById('open-invitation').onclick=()=>{document.getElementById('cover').style.display='none';document.getElementById('app').style.opacity=1;if(d.logistics.music)new Audio(base+d.logistics.music).play().catch(()=>{})};
});
</script></body></html>
