<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --pink-light: #FFEAF1;
            --pink-main: #FFB6C1;
            --pink-dark: #FF8DA1;
            --rose-gold: #E6B8A2;
            --white: #FFFFFF;
            --text: #6D5A5E;
            --text-soft: #9A8A8F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--pink-light);
            color: var(--text);
            overflow-x: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/pink-flowers.png');
        }
  .font-script { font-family: 'Alex Brush', cursive; }
  .text-pink { color: var(--pink-dark); }
  .bg-pink { background-color: var(--pink-main); }
  .bg-rose { background-color: var(--rose-gold); }
        
        /* LOADER ESTETIK */
        #loader {
            position: fixed; inset: 0; z-index: 9999;
            background: var(--pink-light);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
        }
  .loader-heart {
            font-size: 3rem; color: var(--pink-dark);
            animation: heartbeat 1.5s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* COVER SUPER ESTETIK */
  .cover {
            height: 100vh;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            background-size: cover; background-position: center;
            overflow: hidden;
        }
  .cover::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,234,241,0.3) 0%, rgba(255,234,241,0.9) 100%);
            z-index: 1;
        }
        /* Floral Border */
  .cover::after {
            content: ''; position: absolute; inset: 0; z-index: 1;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M0,0 Q50,10 100,0 L100,100 Q50,90 0,100 Z" fill="none" stroke="%23FFB6C1" stroke-width="0.5" opacity="0.3"/></svg>');
            background-size: cover; pointer-events: none;
        }
  .cover-content {
            position: relative; z-index: 2; padding: 40px 30px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 2px solid rgba(255,182,193,0.3);
            box-shadow: 0 20px 60px rgba(255,141,161,0.2);
            max-width: 90%;
            animation: fadeInUp 1s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
  .cover.to { font-size: 0.85rem; letter-spacing: 3px; color: var(--text-soft); text-transform: uppercase; }
  .cover.guest-name {
            font-size: 1.4rem; margin: 10px 0 25px; font-weight: 600; color: var(--pink-dark);
        }
  .cover h1 {
            font-family: 'Alex Brush', cursive;
            font-size: 5rem;
            color: var(--pink-dark);
            line-height: 1;
            text-shadow: 2px 2px 10px rgba(255,141,161,0.2);
        }
  .cover.date { margin: 25px 0; letter-spacing: 3px; font-size: 0.9rem; color: var(--text-soft); }
  .btn-pink {
            display: inline-block; background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
            color: white; padding: 16px 45px; text-decoration: none; font-weight: 500;
            letter-spacing: 2px; border-radius: 50px; transition: all 0.4s ease;
            cursor: pointer; box-shadow: 0 8px 25px rgba(255,141,161,0.4);
            border: none; font-family: 'Outfit', sans-serif; font-size: 0.85rem;
        }
  .btn-pink:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(255,141,161,0.5); }

        /* MAIN CONTENT */
  .container { max-width: 480px; margin: 0 auto; }
        section { padding: 80px 25px; text-align: center; }
  .section-title {
            font-family: 'Alex Brush', cursive;
            font-size: 4rem;
            color: var(--pink-dark);
            margin-bottom: 50px;
            position: relative;
        }
  .section-title::after {
            content: '🌸'; position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%); font-size: 1.5rem;
        }

        /* COUPLE CARD PINK */
  .couple-wrap { display: grid; gap: 40px; }
  .couple-card {
            background: var(--white);
            border-radius: 25px; padding: 25px;
            box-shadow: 0 15px 40px rgba(255,141,161,0.15);
            border: 2px solid rgba(255,182,193,0.2);
            position: relative; overflow: hidden;
        }
  .couple-card::before {
            content: ''; position: absolute; top: -50%; right: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,182,193,0.1) 0%, transparent 70%);
        }
  .couple-card img {
            width: 100%; height: 380px; object-fit: cover;
            border-radius: 20px; margin-bottom: 20px;
        }
  .couple-card h3 {
            font-family: 'Alex Brush', cursive;
            font-size: 3rem; color: var(--pink-dark); margin-bottom: 8px;
        }
  .couple-card p { color: var(--text-soft); font-size: 0.9rem; line-height: 1.6; }
  .couple-card a { color: var(--pink-dark); text-decoration: none; font-weight: 500; }

        /* CARD STYLE */
  .pink-card {
            background: var(--white); border-radius: 25px; padding: 35px 25px;
            margin-bottom: 25px; text-align: left;
            box-shadow: 0 15px 40px rgba(255,141,161,0.15);
            border: 2px solid rgba(255,182,193,0.2);
        }
  .pink-card h3 { color: var(--pink-dark); font-size: 1.5rem; margin-bottom: 18px; font-weight: 600; }
  .pink-card p { color: var(--text-soft); margin-bottom: 10px; line-height: 1.7; }

        /* COUNTDOWN PINK */
  .countdown-wrap {
            display: flex; justify-content: center; gap: 15px;
            margin: 30px 0 40px;
        }
  .countdown-box {
            background: linear-gradient(135deg, var(--white), var(--pink-light));
            border: 2px solid rgba(255,182,193,0.3);
            border-radius: 20px; padding: 15px 10px; width: 75px;
            box-shadow: 0 8px 20px rgba(255,141,161,0.15);
        }
  .countdown-box.num {
            font-size: 2rem; font-weight: 600; color: var(--pink-dark);
        }
  .countdown-box.label {
            font-size: 0.65rem; color: var(--text-soft); text-transform: uppercase; letter-spacing: 1px;
        }

        /* GALLERY SLIDER JELAS */
  .gallery-slider { width: 100%; padding-bottom: 50px; }
  .swiper-slide {
            width: 85%; height: 450px; border-radius: 25px;
            overflow: hidden; box-shadow: 0 15px 40px rgba(255,141,161,0.2);
        }
  .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }
  .swiper-pagination-bullet { background: var(--pink-main); opacity: 0.5; width: 10px; height: 10px; }
  .swiper-pagination-bullet-active { background: var(--pink-dark); opacity: 1; width: 30px; border-radius: 5px; }

  .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin-top: 25px; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 40px rgba(255,141,161,0.2); }
  .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
  .gift-box img { max-width: 200px; margin: 25px auto; display: block; border-radius: 15px; box-shadow: 0 10px 30px rgba(255,141,161,0.2); }
  .footer { padding: 70px 25px; font-size: 0.9rem; color: var(--text-soft); }

  .music-btn {
            position: fixed; bottom: 25px; right: 25px; z-index: 999;
            width: 60px; height: 60px; border-radius: 50%;
            background: linear-gradient(135deg, var(--pink-main), var(--pink-dark));
            color: white; border: 3px solid var(--white);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; box-shadow: 0 8px 30px rgba(255,141,161,0.5);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
  .hidden { display: none!important; }
  .reveal { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body>
    <div id="loader">
        <div class="loader-heart"><i class="fas fa-heart"></i></div>
        <p style="margin-top: 20px; color: var(--pink-dark); letter-spacing: 2px;">Loading...</p>
    </div>

    <main id="main" class="container hidden">
        <section id="cover" class="cover">
            <div class="cover-content">
                <p class="to">Kepada Yth.</p>
                <p class="guest-name" id="guestName">Tamu Undangan</p>
                <h1 id="coupleName"></h1>
                <p class="date" id="weddingDate"></p>
                <button class="btn-pink" id="openBtn">
                    <i class="fas fa-envelope-open"></i> Buka Undangan
                </button>
            </div>
        </section>

        <section id="couple">
            <h2 class="section-title">Mempelai</h2>
            <div class="couple-wrap">
                <div class="couple-card reveal">
                    <img id="groomImg" src="" alt="Mempelai Pria">
                    <h3 id="groomName"></h3>
                    <p id="groomParents"></p>
                    <p><a id="groomIg" href="" target="_blank"></a></p>
                </div>
                <div class="couple-card reveal">
                    <img id="brideImg" src="" alt="Mempelai Wanita">
                    <h3 id="brideName"></h3>
                    <p id="brideParents"></p>
                    <p><a id="brideIg" href="" target="_blank"></a></p>
                </div>
            </div>
        </section>

        <section id="events">
            <h2 class="section-title">Save The Date</h2>
            <div id="countdown" class="countdown-wrap reveal"></div>
            <div id="eventList"></div>
        </section>

        <section id="loveStory" class="hidden">
            <h2 class="section-title">Perjalanan Cinta</h2>
            <div id="storyList"></div>
        </section>

        <section id="gallery">
            <h2 class="section-title">Momen Bahagia</h2>
            <div class="swiper gallery-slider">
                <div class="swiper-wrapper" id="galleryWrapper"></div>
                <div class="swiper-pagination"></div>
            </div>
        </section>

        <section id="video" class="hidden">
            <h2 class="section-title">Video Kami</h2>
            <div class="video-wrapper" id="videoWrapper"></div>
        </section>

        <section id="gift" class="hidden">
            <h2 class="section-title">Wedding Gift</h2>
            <div id="giftList"></div>
        </section>

        <section id="logistics" class="hidden">
            <h2 class="section-title">Informasi Acara</h2>
            <div class="pink-card" id="logisticsBox"></div>
        </section>

        <section class="footer">
            <p>Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir untuk memberikan doa restu.</p>
            <p style="margin-top: 25px; color: var(--pink-dark); font-family: 'Alex Brush', cursive; font-size: 2.5rem;" id="footerCouple"></p>
        </section>
    </main>

    <button id="musicBtn" class="music-btn hidden">♫</button>
    <audio id="bgMusic" loop></audio>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        gsap.registerPlugin(ScrollTrigger);
        const params = new URLSearchParams(window.location.search);
        const clientSlug = params.get('c');
        const guestName = params.get('to') || 'Tamu Undangan';
        const basePath = `../../public/clients/${clientSlug}/`;

        fetch(`${basePath}data.json`).then(res => res.json()).then(data => {
            // THEME
            if (data.settings?.themeColor) document.documentElement.style.setProperty('--pink-dark', data.settings.themeColor);
            document.title = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
            
            // COVER
            document.getElementById('guestName').textContent = guestName.replace(/\+/g, ' ');
            document.getElementById('coupleName').textContent = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
            document.getElementById('cover').style.backgroundImage = `url('${basePath}${data.gallery.heroImage}')`;
            const eventDate = new Date(data.events[0].date);
            document.getElementById('weddingDate').textContent = eventDate.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            // COUPLE
            document.getElementById('groomImg').src = basePath + data.couple.groom.image;
            document.getElementById('groomName').textContent = data.couple.groom.name;
            document.getElementById('groomParents').textContent = `Putra dari ${data.couple.groom.father} & ${data.couple.groom.mother}`;
            if (data.couple.groom.instagram) {
                document.getElementById('groomIg').innerHTML = `<i class="fab fa-instagram"></i> ${data.couple.groom.instagram}`;
                document.getElementById('groomIg').href = `https://instagram.com/${data.couple.groom.instagram.replace('@', '')}`;
            }
            document.getElementById('brideImg').src = basePath + data.couple.bride.image;
            document.getElementById('brideName').textContent = data.couple.bride.name;
            document.getElementById('brideParents').textContent = `Putri dari ${data.couple.bride.father} & ${data.couple.bride.mother}`;
            if (data.couple.bride.instagram) {
                document.getElementById('brideIg').innerHTML = `<i class="fab fa-instagram"></i> ${data.couple.bride.instagram}`;
                document.getElementById('brideIg').href = `https://instagram.com/${data.couple.bride.instagram.replace('@', '')}`;
            }

            // COUNTDOWN
            const countdownDate = new Date(`${data.events[0].date}T${data.events[0].startTime}:00`).getTime();
            setInterval(() => {
                const distance = countdownDate - new Date().getTime();
                const d = Math.max(0, Math.floor(distance / 86400000));
                const h = Math.max(0, Math.floor((distance % 86400000) / 3600000));
                const m = Math.max(0, Math.floor((distance % 3600000) / 60000));
                const s = Math.max(0, Math.floor((distance % 60000) / 1000));
                document.getElementById('countdown').innerHTML = `
                    <div class="countdown-box"><div class="num">${d}</div><div class="label">Hari</div></div>
                    <div class="countdown-box"><div class="num">${h}</div><div class="label">Jam</div></div>
                    <div class="countdown-box"><div class="num">${m}</div><div class="label">Menit</div></div>
                    <div class="countdown-box"><div class="num">${s}</div><div class="label">Detik</div></div>
                `;
            }, 1000);

            // EVENTS
            const eventList = document.getElementById('eventList');
            data.events.forEach(ev => {
                const date = new Date(ev.date).toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
                eventList.innerHTML += `<div class="pink-card reveal"><h3>${ev.title}</h3><p><strong>${date}</strong></p><p>Pukul ${ev.startTime} - ${ev.endTime} ${ev.timezone}</p><p>${ev.address}</p>${ev.googleMaps? `<a href="${ev.googleMaps}" target="_blank" class="btn-pink" style="margin-top:20px; display: inline-block;"><i class="fas fa-map-marker-alt"></i> Lihat Lokasi</a>` : ''}</div>`;
            });

            // LOVE STORY
            if (data.loveStory && data.loveStory.length > 0) {
                document.getElementById('loveStory').classList.remove('hidden');
                const storyList = document.getElementById('storyList');
                data.loveStory.forEach(story => {
                    storyList.innerHTML += `<div class="pink-card reveal"><h3><span style="color: var(--rose-gold);">${story.date}</span> - ${story.title}</h3><p>${story.description}</p></div>`;
                });
            }

            // GALLERY SLIDER JELAS
            const galleryWrapper = document.getElementById('galleryWrapper');
            if (data.gallery.album && data.gallery.album.length > 0) {
                data.gallery.album.forEach(img => {
                    galleryWrapper.innerHTML += `<div class="swiper-slide"><img src="${basePath}${img}" alt="Gallery"></div>`;
                });
                new Swiper('.gallery-slider', {
                    effect: 'coverflow',
                    grabCursor: true,
                    centeredSlides: true,
                    slidesPerView: 'auto',
                    loop: true,
                    coverflowEffect: { rotate: 0, stretch: 0, depth: 100, modifier: 2, slideShadows: false },
                    autoplay: { delay: 3500, disableOnInteraction: false },
                    pagination: { el: '.swiper-pagination', clickable: true }
                });
            } else { document.getElementById('gallery').classList.add('hidden'); }

            // VIDEO
            if (data.gallery.videoYoutubeId) {
                document.getElementById('video').classList.remove('hidden');
                document.getElementById('videoWrapper').innerHTML = `<iframe src="https://www.youtube.com/embed/${data.gallery.videoYoutubeId}" allowfullscreen></iframe>`;
            }

            // GIFT
            if (data.digitalGift && data.digitalGift.length > 0) {
                document.getElementById('gift').classList.remove('hidden');
                const giftList = document.getElementById('giftList');
                data.digitalGift.forEach(gift => {
                    giftList.innerHTML += `<div class="pink-card gift-box reveal"><h3>${gift.provider}</h3><p style="font-size: 1.3rem; letter-spacing: 3px; margin: 15px 0;">${gift.accountNumber}</p><p>a.n ${gift.accountHolder}</p>${gift.qrImage? `<img src="${basePath}${gift.qrImage}" alt="QR Code">` : ''}<button onclick="navigator.clipboard.writeText('${gift.accountNumber}');this.innerHTML='<i class=\'fas fa-check\'></i> Tersalin'" class="btn-pink" style="margin-top:15px;"><i class="fas fa-copy"></i> Salin No. Rek</button></div>`;
                });
            }

            // LOGISTICS
            if (data.logistics && (data.logistics.dressCode || data.logistics.rsvpWaNumber || data.logistics.guestNote)) {
                document.getElementById('logistics').classList.remove('hidden');
                let html = '';
                if (data.logistics.dressCode) html += `<p><strong>Dress Code:</strong> ${data.logistics.dressCode}</p>`;
                if (data.logistics.guestNote) html += `<p><strong>Catatan:</strong> ${data.logistics.guestNote}</p>`;
                if (data.logistics.rsvpWaNumber) {
                    const waLink = `https://wa.me/${data.logistics.rsvpWaNumber}?text=Halo, saya ${guestName.replace(/\+/g, ' ')} ingin konfirmasi kehadiran`;
                    html += `<a href="${waLink}" target="_blank" class="btn-pink" style="margin-top: 20px; display: inline-block;"><i class="fab fa-whatsapp"></i> Konfirmasi WhatsApp</a>`;
                }
                document.getElementById('logisticsBox').innerHTML = html;
            }

            // MUSIC
            if (data.logistics?.music) {
                const audio = document.getElementById('bgMusic');
                const musicBtn = document.getElementById('musicBtn');
                audio.src = basePath + data.logistics.music;
                musicBtn.classList.remove('hidden');
                let isPlaying = false;
                musicBtn.onclick = () => {
                    if (isPlaying) { audio.pause(); musicBtn.innerHTML = '♫'; }
                    else { audio.play(); musicBtn.innerHTML = '❚❚'; }
                    isPlaying =!isPlaying;
                };
                document.getElementById('openBtn').addEventListener('click', () => {
                    audio.play().then(() => { isPlaying = true; musicBtn.innerHTML = '❚❚'; }).catch(e => {});
                });
            }

            document.getElementById('footerCouple').textContent = `${data.couple.groom.nickname} & ${data.couple.bride.nickname}`;
            
            // OPEN INVITATION
            document.getElementById('openBtn').addEventListener('click', (e) => {
                e.preventDefault();
                gsap.to('#cover', { opacity: 0, duration: 1, onComplete: () => {
                    document.getElementById('cover').style.display = 'none';
                    document.getElementById('main').classList.remove('hidden');
                    initScroll();
                    window.scrollTo({ top: document.getElementById('couple').offsetTop, behavior: 'smooth' });
                }});
            });

            function initScroll() {
                gsap.utils.toArray('.reveal').forEach(el => {
                    gsap.fromTo(el, { opacity: 0, y: 30 }, {
                        opacity: 1, y: 0, duration: 1,
                        scrollTrigger: { trigger: el, start: 'top 85%' }
                    });
                });
            }

            // LOADER
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 1000);

        }).catch(err => {
            document.getElementById('loader').innerHTML = '<div class="cover-content"><p style="color: var(--pink-dark);">Gagal memuat data undangan</p></div>';
            console.error(err);
        });
    </script>
</body>
</html>
