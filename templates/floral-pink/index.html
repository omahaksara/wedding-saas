<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding Celebration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <!-- Ditambahkan SplitType untuk efek kemunculan teks per huruf ala web agensi premium -->
    <script src="https://unpkg.com/split-type"></script>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --theme: #8B7355; 
            --bg: #FAF7F2; 
            --gold: #C9A86A; 
            --accent: #B76E79; 
            --dark: #1A1A1A;
        }
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); 
            color: var(--dark); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }
        .font-script { font-family: 'Parisienne', cursive; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Elemen yang dianimasikan disembunyikan secara rapi di awal */
        .reveal-silent { opacity: 0; }
        
        /* Frame Polaroid Mewah dengan Efek Bayangan Lembut */
        .polaroid-frame { 
            background: white; 
            padding: 16px 16px 48px 16px; 
            box-shadow: 0 20px 40px rgba(139,115,85, 0.08); 
            border-radius: 4px; 
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .polaroid-frame:hover {
            transform: scale(1.03) rotate(0deg) !important;
        }

        /* Tombol Utama Luxury dengan Animasi Border & Hover */
        .btn-main { 
            background: var(--theme); 
            color: white; 
            padding: 14px 36px; 
            border-radius: 99px; 
            font-size: 10px; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            box-shadow: 0 10px 30px rgba(139,115,85, 0.2); 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }
        .btn-main:hover { 
            background: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        /* Countdown Item Minimalis Eksklusif */
        .cd-item { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(8px);
            padding: 14px; 
            border-radius: 16px; 
            min-width: 70px; 
            border: 1px solid rgba(139,115,85, 0.1); 
        }

        /* Garis Lini Masa Kisah Cinta Premium */
        .timeline-item::before { 
            content: ''; 
            position: absolute; 
            left: -21px; 
            top: 8px; 
            width: 8px; 
            height: 8px; 
            background: var(--theme); 
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(139,115,85, 0.15);
        }

        /* Floating Music Kit */
        .music-control {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 90;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .music-pulse {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--theme);
            opacity: 0.15;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- FLOATING AUDIO CONTROLLER -->
    <div id="music-btn" class="music-control hidden opacity-0" onclick="toggleAudio()">
        <div class="music-pulse" id="music-pulse"></div>
        <i id="music-icon" class="fa-solid fa-compact-disc text-[var(--theme)] text-lg animate-spin" style="animation-duration: 4s;"></i>
    </div>

    <!-- EXCLUSIVE COVER SCREEN -->
    <div id="cover" class="fixed inset-0 z-[100] flex items-center justify-center text-center text-white overflow-hidden">
        <img id="cover-img" class="absolute inset-0 w-full h-full object-cover scale-110" src="">
        <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-black/40 to-black/70"></div>
        
        <div class="relative z-10 px-6 max-w-md mx-auto">
            <p id="bismillah" class="font-serif text-lg italic mb-6 tracking-wide hidden opacity-90">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</p>
            <p class="text-[9px] tracking-[0.5em] uppercase mb-4 opacity-70 font-light">The Wedding Celebration Of</p>
            
            <!-- Elemen Teks yang akan Dipecah secara Sinematik -->
            <h1 id="names-cover" class="font-script text-6xl text-gold mb-12"></h1>
            
            <div id="cover-guest-area" class="opacity-0 translate-y-4">
                <p class="text-[9px] uppercase tracking-[0.3em] opacity-50 mb-2">Dearly Invited to</p>
                <h2 id="guest-name" class="text-2xl font-serif italic font-light tracking-wide mb-1"></h2>
                <p id="guest-group" class="text-[10px] uppercase tracking-widest text-gold opacity-80 mb-12"></p>
                <button onclick="openInvitation()" class="btn-main"><i class="fa-regular fa-envelope-open mr-2 text-xs"></i> Open Invitation</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <div id="app" class="hidden opacity-0 max-w-md mx-auto bg-white shadow-2xl relative z-10">
        
        <!-- HERO REVEAL SECTION -->
        <section class="relative h-[95vh] flex flex-col items-center justify-end pb-24 text-center text-white overflow-hidden">
            <img id="hero-img" class="absolute inset-0 w-full h-full object-cover" src="">
            <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/20 to-transparent"></div>
            <div class="relative z-10 px-4 w-full">
                <h2 id="names-hero" class="font-script text-6xl text-gold tracking-wide"></h2>
                <div class="w-12 h-[1px] bg-gold/50 mx-auto my-5"></div>
                <p id="date-hero" class="text-xs tracking-[0.3em] font-light uppercase opacity-90"></p>
            </div>
        </section>

        <!-- COUNTDOWN TIMER SECTION -->
        <section id="countdown-wrap" class="py-16 px-6 text-center reveal-silent hidden bg-gradient-to-b from-white to-[#FAF7F2]">
            <p class="text-[9px] uppercase tracking-[0.4em] mb-8 text-stone-400 font-medium">The Holy Countdown</p>
            <div class="flex justify-center gap-3">
                <div class="cd-item"><span id="days" class="text-2xl font-serif font-light text-[var(--theme)]">00</span><p class="text-[8px] uppercase tracking-wider text-stone-400 mt-1">Days</p></div>
                <div class="cd-item"><span id="hours" class="text-2xl font-serif font-light text-[var(--theme)]">00</span><p class="text-[8px] uppercase tracking-wider text-stone-400 mt-1">Hours</p></div>
                <div class="cd-item"><span id="mins" class="text-2xl font-serif font-light text-[var(--theme)]">00</span><p class="text-[8px] uppercase tracking-wider text-stone-400 mt-1">Mins</p></div>
                <div class="cd-item"><span id="secs" class="text-2xl font-serif font-light text-[var(--theme)]">00</span><p class="text-[8px] uppercase tracking-wider text-stone-400 mt-1">Secs</p></div>
            </div>
        </section>

        <!-- BRIDE & GROOM PROFILE SECTION -->
        <section class="py-24 px-8 text-center bg-[#FAF7F2]">
            <!-- Profil Mempelai Pria -->
            <div class="reveal-silent mb-20 profile-card-groom">
                <div class="polaroid-frame rotate-[-2deg] w-60">
                    <img id="groom-img" src="" class="w-full h-64 object-cover filter sepia-[10%] contrast-[105%]">
                </div>
                <h3 id="groom-name" class="font-serif text-3xl text-[var(--theme)] font-medium mt-8 tracking-wide"></h3>
                <p id="groom-parents" class="text-xs mt-3 opacity-60 font-light leading-relaxed whitespace-pre-line"></p>
                <a id="groom-ig" target="_blank" class="inline-flex items-center text-[10px] tracking-widest uppercase mt-4 text-gold border-b border-gold/30 pb-0.5 hover:opacity-70 transition-opacity"><i class="fa-brands fa-instagram mr-1.5 text-xs"></i></a>
            </div>
            
            <div class="font-script text-5xl opacity-20 my-12 text-[var(--theme)]">&</div>
            
            <!-- Profil Mempelai Wanita -->
            <div class="reveal-silent mb-12 profile-card-bride">
                <div class="polaroid-frame rotate-[2deg] w-60">
                    <img id="bride-img" src="" class="w-full h-64 object-cover filter sepia-[10%] contrast-[105%]">
                </div>
                <h3 id="bride-name" class="font-serif text-3xl text-[var(--theme)] font-medium mt-8 tracking-wide"></h3>
                <p id="bride-parents" class="text-xs mt-3 opacity-60 font-light leading-relaxed whitespace-pre-line"></p>
                <a id="bride-ig" target="_blank" class="inline-flex items-center text-[10px] tracking-widest uppercase mt-4 text-gold border-b border-gold/30 pb-0.5 hover:opacity-70 transition-opacity"><i class="fa-brands fa-instagram mr-1.5 text-xs"></i></a>
            </div>
        </section>

        <!-- DYNAMIC PORTION CONTAINER -->
        <div id="dynamic-area"></div>

        <!-- LUXURY BRANDING FOOTER -->
        <footer class="py-16 text-center border-t border-stone-200/60 bg-[#FAF7F2]">
            <p class="font-script text-4xl text-gold tracking-wide" id="footer-names"></p>
            <div class="w-8 h-[1px] bg-stone-300 mx-auto my-4"></div>
            <p class="text-[9px] opacity-40 tracking-[0.3em] uppercase font-light">Digital Invitation by Omah Aksara</p>
        </footer>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('c') || 'yaya-oci';
        const path = `../../public/clients/${slug}/`;
        let weddingAudio;
        let isPlaying = false;
        let nickGroom = '', nickBride = '';

        document.getElementById('guest-name').innerText = (params.get('to') || 'Tamu Undangan').replace(/\+/g, ' ');

        // Pengaturan Awal Animasi Pembuka Layar Sampul (Cover Intro)
        gsap.to('#cover-img', { scale: 1, duration: 4, ease: 'power2.out' });

        fetch(`${path}data.json`).then(r => r.json()).then(data => {
            // Pemetaan Setelan Kustom Variabel CSS
            if(data.settings.themeColor) document.documentElement.style.setProperty('--theme', data.settings.themeColor);
            if(data.settings.accentColor) document.documentElement.style.setProperty('--accent', data.settings.accentColor);
            if(data.settings.bgColor) document.documentElement.style.setProperty('--bg', data.settings.bgColor);
            if(data.settings.islami) document.getElementById('bismillah').classList.remove('hidden');

            nickGroom = data.couple.groom.nickname;
            nickBride = data.couple.bride.nickname;
            const pair = `${nickGroom} & ${nickBride}`;
            
            document.getElementById('names-cover').innerText = pair;
            document.getElementById('names-hero').innerText = pair;
            document.getElementById('footer-names').innerText = pair;
            document.getElementById('cover-img').src = path + data.gallery.heroImage;
            document.getElementById('hero-img').src = path + data.gallery.heroImage;

            // Trigger Pembagian Teks Kemunculan Karakter Mewah (SplitType)
            const typeCover = new SplitType('#names-cover', { types: 'chars' });
            gsap.from(typeCover.chars, { opacity: 0, y: 30, rotateX: -90, stagger: 0.05, duration: 1.5, ease: 'back.out(1.7)', onComplete: () => {
                gsap.to('#cover-guest-area', { opacity: 1, y: 0, duration: 1, ease: 'power3.out' });
            }});
            
            if (data.events[0]) {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('date-hero').innerText = new Date(data.events[0].date).toLocaleDateString('id-ID', options);
            }

            if (data.guest && data.guest.group) {
                document.getElementById('guest-group').innerText = data.guest.group;
            }
            
            // Konfigurasi Mempelai Pria
            document.getElementById('groom-name').innerText = data.couple.groom.name;
            document.getElementById('groom-img').src = path + data.couple.groom.image;
            document.getElementById('groom-parents').innerText = `Putra Tercinta dari \n ${data.couple.groom.father} & ${data.couple.groom.mother}`;
            if (data.couple.groom.instagram) {
                document.getElementById('groom-ig').innerHTML += `@${data.couple.groom.instagram}`;
                document.getElementById('groom-ig').href = `https://instagram.com/${data.couple.groom.instagram}`;
            }

            // Konfigurasi Mempelai Wanita
            document.getElementById('bride-name').innerText = data.couple.bride.name;
            document.getElementById('bride-img').src = path + data.couple.bride.image;
            document.getElementById('bride-parents').innerText = `Putri Tercinta dari \n ${data.couple.bride.father} & ${data.couple.bride.mother}`;
            if (data.couple.bride.instagram) {
                document.getElementById('bride-ig').innerHTML += `@${data.couple.bride.instagram}`;
                document.getElementById('bride-ig').href = `https://instagram.com/${data.couple.bride.instagram}`;
            }

            // Engine Countdown Presisi
            if(data.settings.showCountdown && data.countdown && data.countdown.targetDate) {
                document.getElementById('countdown-wrap').classList.remove('hidden');
                const target = new Date(data.countdown.targetDate).getTime();
                setInterval(() => {
                    const diff = target - new Date().getTime();
                    if(diff > 0) {
                        document.getElementById('days').innerText = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
                        document.getElementById('hours').innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
                        document.getElementById('mins').innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
                        document.getElementById('secs').innerText = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
                    }
                }, 1000);
            }

            // Generator Injeksi Area Dinamis (Premium Components)
            let html = '';

            // 1. Holy Quotes
            if(data.quote) {
                html += `<section class="reveal-silent py-24 px-10 text-center italic border-b border-stone-100 bg-white">
                    <span class="font-serif text-4xl text-[var(--theme)] opacity-30 block mb-6">“</span>
                    ${data.quote.arab ? `<p class="font-serif text-2xl text-[var(--theme)] mb-6 leading-loose tracking-wide">${data.quote.arab}</p>` : ''}
                    <p class="text-xs font-light leading-relaxed tracking-wide text-stone-600 px-2">"${data.quote.text}"</p>
                    <p class="text-[9px] font-medium mt-6 tracking-[0.3em] uppercase text-gold">— ${data.quote.source}</p>
                </section>`;
            }

            // 2. Love Story Timeline (Luxury Minimalist Line)
            if(data.settings.showLoveStory && data.loveStory) {
                html += `<section class="reveal-silent py-24 px-8 bg-[#FAF7F2]">
                    <p class="text-[9px] tracking-[0.4em] uppercase text-stone-400 text-center mb-2 font-medium">Our Journey</p>
                    <h4 class="font-serif text-3xl mb-16 text-center text-[var(--theme)] font-light tracking-wide">Kisah Kasih Kami</h4>
                    <div class="relative max-w-xs mx-auto border-l border-stone-200 pl-6 space-y-12">
                        ${data.loveStory.map(story => `
                            <div class="timeline-item relative">
                                <span class="text-[9px] font-medium text-white px-2.5 py-1 rounded-full shadow-sm tracking-widest" style="background: var(--theme)">${story.year}</span>
                                <h5 class="font-serif text-lg text-[var(--theme)] mt-3 font-medium tracking-wide">${story.title}</h5>
                                <p class="text-xs font-light leading-relaxed mt-2 text-stone-600">${story.description}</p>
                            </div>
                        `).join('')}
                    </div>
                </section>`;
            }

            // 3. Multi-Events Schedule Card
            if(data.events && data.events.length > 0) {
                const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                html += `<section class="reveal-silent py-24 px-8 text-center bg-white">
                    <p class="text-[9px] tracking-[0.4em] uppercase text-stone-400 mb-2 font-medium">The Celebration</p>
                    <h4 class="font-serif text-3xl mb-12 text-[var(--theme)] font-light tracking-wide">Agenda Acara</h4>
                    ${data.events.map(e => {
                        const formattedDate = new Date(e.date).toLocaleDateString('id-ID', dateOptions);
                        return `
                            <div class="p-8 rounded-2xl bg-[#FAF7F2] border border-stone-200/40 mb-8 shadow-sm transition-transform duration-300 hover:translate-y-[-4px]">
                                <h5 class="font-serif text-2xl text-[var(--theme)] mb-3 font-medium tracking-wide">${e.title}</h5>
                                <div class="w-6 h-[1px] bg-gold mx-auto mb-4"></div>
                                <p class="text-xs font-medium text-stone-700 tracking-wide">${formattedDate}</p>
                                <p class="text-[10px] text-gold font-mono mt-1 tracking-widest uppercase">${e.startTime} - ${e.endTime} ${e.timezone}</p>
                                <p class="text-xs font-light px-2 leading-relaxed text-stone-500 mt-4 mb-6">${e.address}</p>
                                <a href="${e.googleMaps}" target="_blank" class="btn-main text-[9px] inline-block"><i class="fa-solid fa-location-dot mr-1.5"></i> Google Maps</a>
                            </div>
                        `;
                    }).join('')}
                </section>`;
            }

            // 4. Live Virtual Stream Integration
            if(data.liveStreaming && data.liveStreaming.enabled) {
                html += `<section class="reveal-silent py-20 px-8 text-center bg-stone-50 border-y border-stone-200/40">
                    <h4 class="font-serif text-xl text-[var(--theme)] mb-2 tracking-wide font-medium">Virtual Celebration</h4>
                    <p class="text-xs font-light text-stone-500 mb-6 max-w-xs mx-auto leading-relaxed">Merupakan suatu kebahagiaan apabila Bapak/Ibu/Saudara/i berkenan menyaksikan prosesi sakral kami melalui siaran langsung virtual:</p>
                    <a href="${data.liveStreaming.url}" target="_blank" class="btn-main text-[9px] inline-block" style="background: var(--accent); box-shadow: 0 10px 25px rgba(183,110,121,0.25);"><i class="fa-solid fa-video mr-1.5"></i> Broadcast ${data.liveStreaming.platform}</a>
                </section>`;
            }

            // 5. Grid Album Gallery (Parallax Ready Layout)
            if(data.gallery && data.gallery.album) {
                html += `<section class="reveal-silent py-24 px-4 text-center bg-white">
                    <p class="text-[9px] tracking-[0.4em] uppercase text-stone-400 mb-2 font-medium">Our Moments</p>
                    <h4 class="font-serif text-3xl mb-12 text-[var(--theme)] font-light tracking-wide">Galeri Kebahagiaan</h4>
                    <div class="grid grid-cols-2 gap-3 max-w-sm mx-auto">
                        ${data.gallery.album.map(img => `<div class="aspect-[3/4] rounded-xl overflow-hidden shadow-sm bg-stone-100"><img src="${path+img}" class="w-full h-full object-cover transform scale-100 hover:scale-105 transition-transform duration-700"></div>`).join('')}
                    </div>
                </section>`;
            }

            // 6. Prewedding Cinema Embed
            if(data.gallery && data.gallery.videoYoutubeId) {
                html += `<section class="reveal-silent py-24 px-6 text-center bg-[#FAF7F2]">
                    <h4 class="font-serif text-3xl mb-12 text-[var(--theme)] font-light tracking-wide">Prewedding Cinema</h4>
                    <div class="aspect-video rounded-2xl overflow-hidden shadow-2xl border-4 border-white bg-stone-800">
                        <iframe class="w-full h-full" src="https://www.youtube.com/embed/${data.gallery.videoYoutubeId}" frameborder="0" allowfullscreen></iframe>
                    </div>
                </section>`;
            }

            // 7. Medical & Hospitality Protocols
            if(data.settings.showProtocols && data.protocols) {
                html += `<section class="reveal-silent py-24 px-6 text-center bg-white">
                    <p class="text-[9px] tracking-[0.4em] uppercase text-stone-400 mb-2 font-medium">Notice</p>
                    <h4 class="font-serif text-2xl mb-10 text-[var(--theme)] font-light tracking-wide">Protokol Kesehatan</h4>
                    <div class="flex flex-wrap justify-center gap-4 max-w-xs mx-auto">
                        ${data.protocols.map(p => `
                            <div class="bg-[#FAF7F2]/60 border border-stone-200/40 p-4 rounded-2xl w-[90px] flex flex-col items-center shadow-sm">
                                <span class="text-2xl mb-2">${p.icon}</span>
                                <span class="text-[9px] font-medium text-stone-500 tracking-wider text-center leading-tight">${p.label}</span>
                            </div>
                        `).join('')}
                    </div>
                </section>`;
            }

            // 8. Financial Wallet Gift & Physical Shipping
            if(data.digitalGift) {
                html += `<section class="reveal-silent py-24 px-8 text-center bg-[#FAF7F2]">
                    <p class="text-[9px] tracking-[0.4em] uppercase text-stone-400 mb-2 font-medium">Love Gift</p>
                    <h4 class="font-serif text-3xl mb-4 text-[var(--theme)] font-light tracking-wide">Kado Digital</h4>
                    <p class="text-xs font-light text-stone-500 mb-10 px-2 leading-relaxed">Doa restu Anda adalah karunia terindah. Namun jika ingin memberikan tanda kasih, silakan melalui saluran berikut:</p>
                    ${data.digitalGift.map(g => `
                        <div class="p-6 bg-white rounded-2xl mb-4 shadow-sm border border-stone-200/30 max-w-xs mx-auto relative group">
                            <p class="text-[9px] font-bold text-gold uppercase tracking-[0.2em] mb-1">${g.provider}</p>
                            <p class="text-lg font-serif font-semibold tracking-[0.1em] text-stone-800 my-1 selection:bg-gold/20" id="num-${g.accountNumber}">${g.accountNumber}</p>
                            <p class="text-[9px] uppercase tracking-wider text-stone-400">a.n ${g.accountHolder}</p>
                        </div>
                    `).join('')}
                </section>`;
            }

            // 9. Premium Automated RSVP Connector
            if(data.logistics.rsvpWaNumber) {
                const guestNameParam = encodeURIComponent(document.getElementById('guest-name').innerText);
                html += `<section class="reveal-silent py-24 px-8 text-center bg-white rounded-t-[40px] shadow-[0_-15px_40px_rgba(0,0,0,0.02)]">
                    <p class="text-[9px] tracking-[0.4em] uppercase text-stone-400 mb-2 font-medium">Reservation</p>
                    <h4 class="font-serif text-3xl mb-4 text-[var(--theme)] font-light tracking-wide">Konfirmasi Kehadiran</h4>
                    ${data.logistics.dressCode ? `<p class="text-[9px] font-medium tracking-widest bg-stone-100 text-stone-600 inline-block px-4 py-1.5 rounded-full uppercase mb-8"><i class="fa-solid fa-shirt mr-1.5 text-[10px] text-gold"></i> Dresscode: ${data.logistics.dressCode}</p>` : ''}
                    <p class="text-xs font-light text-stone-500 mb-8 px-4 leading-relaxed">${data.logistics.guestNote || ''}</p>
                    <a href="https://wa.me/${data.logistics.rsvpWaNumber}?text=Halo%20${encodeURIComponent(nickGroom)}%20%26%20${encodeURIComponent(nickBride)},%20Saya%20${guestNameParam}%20ingin%20mengonfirmasi%20kehadiran%20di%20acara%20pernikahan%20anda..." class="btn-main inline-block"><i class="fa-brands fa-whatsapp mr-2 text-xs"></i> Confirm Attendance</a>
                </section>`;
            }

            document.getElementById('dynamic-area').innerHTML = html;
            weddingAudio = new Audio(path + data.logistics.music);
        });

        // KONTROL AUDIO UTAMA
        function toggleAudio() {
            if (!weddingAudio) return;
            if (isPlaying) {
                weddingAudio.pause();
                document.getElementById('music-icon').classList.remove('animate-spin');
                document.getElementById('music-pulse').classList.add('hidden');
            } else {
                weddingAudio.play();
                document.getElementById('music-icon').classList.add('animate-spin');
                document.getElementById('music-pulse').classList.remove('hidden');
            }
            isPlaying = !isPlaying;
        }

        // FUNGSI UTAMA: PEMBUKAAN UNDANGAN BERSKALA SINEMATIK (GSAP ENGINE)
        function openInvitation() {
            if(weddingAudio) { 
                weddingAudio.play().then(() => { isPlaying = true; }).catch(e => console.log("Autoplay block bypass active"));
                weddingAudio.loop = true; 
            }
            
            const timeline = gsap.timeline();

            // 1. Geser layar cover ke atas dengan akselerasi kurva melengkung (Custom Bezier)
            timeline.to('#cover', { 
                y: '-100%', 
                duration: 1.5, 
                ease: 'power4.inOut'
            });

            // 2. Tampilkan kontainer utama aplikasi secara perlahan
            timeline.to('#app', { 
                display: 'block',
                className: 'max-w-md mx-auto bg-white shadow-2xl relative z-10',
                opacity: 1, 
                duration: 0.1 
            }, '-=0.8');

            // 3. Efek Paralaks Melebar untuk Gambar Hero Utama
            timeline.from('#hero-img', {
                scale: 1.2,
                duration: 2,
                ease: 'power3.out'
            }, '-=0.6');

            // 4. Efek Kemunculan Teks Judul Hero Per Huruf
            timeline.from('#names-hero', {
                opacity: 0,
                y: 40,
                duration: 1.2,
                ease: 'power4.out'
            }, '-=1.2');

            // 5. Munculkan Tombol Floating Musik Musik
            timeline.to('#music-btn', {
                display: 'flex',
                opacity: 1,
                duration: 0.5,
                onComplete: () => {
                    document.getElementById('cover').style.display = 'none';
                    // Inisialisasi Trigger Animasi Gulir Halaman (ScrollTrigger) secara Real-Time
                    gsap.utils.toArray('.reveal-silent').forEach(el => {
                        gsap.to(el, { 
                            opacity: 1, 
                            y: 0, 
                            duration: 1.2, 
                            ease: 'power3.out',
                            scrollTrigger: { 
                                trigger: el, 
                                start: 'top 85%',
                                toggleActions: 'play none none none'
                            } 
                        });
                    });
                }
            }, '-=0.5');
        }
    </script>
</body>
</html>
