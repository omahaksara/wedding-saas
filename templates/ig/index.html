<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Instagram Wedding</title>
    <!-- Font standar sistem mobile -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>
        :root {
            --bg: #ffffff; --card: #ffffff; --text: #262626; --muted: #8e8e8e; --border: #efefef;
            --blue: #0095f6; --red: #ed4956; --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); max-width: 470px; margin: 0 auto; min-height: 100vh; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }

        /* COVER PREMIUM */
        .cover { position: fixed; inset: 0; z-index: 999; display: flex; align-items: center; justify-content: center; background: var(--ig-gradient); transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1); }
        .cover.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .cover-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 40px 30px; text-align: center; color: #fff; width: 85%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .cover-name { font-size: 32px; font-weight: 700; margin-bottom: 5px; font-family: 'Roboto', sans-serif; }
        .cover-btn { background: #fff; color: #262626; padding: 15px 40px; border-radius: 12px; border: none; font-weight: 700; font-size: 14px; margin-top: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        /* HEADER */
        .navbar { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo { font-size: 24px; font-weight: 700; font-style: italic; letter-spacing: -1px; }

        /* STORIES */
        .stories { display: flex; gap: 15px; padding: 15px 10px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); background: #fff; }
        .stories::-webkit-scrollbar { display: none; }
        .story { flex: 0 0 auto; text-align: center; width: 75px; }
        .story-ring { width: 68px; height: 68px; border-radius: 50%; background: var(--ig-gradient); padding: 2px; margin: 0 auto 5px; }
        .story-ring img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #fff; object-fit: cover; }
        .story-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* FEED POST */
        .post { background: #fff; margin-bottom: 10px; }
        .post-header { display: flex; align-items: center; padding: 12px 16px; gap: 10px; }
        .post-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--ig-gradient); padding: 1.5px; }
        .post-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }
        .post-info { flex: 1; }
        .post-user { font-size: 13px; font-weight: 600; }
        .post-loc { font-size: 11px; color: #666; }

        .post-img-container { position: relative; width: 100%; aspect-ratio: 1/1; background: #fafafa; overflow: hidden; }
        .post-img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .big-heart { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); color: #fff; font-size: 80px; opacity: 0; pointer-events: none; z-index: 10; }
        .animate-heart { animation: heartPop 0.8s ease-out forwards; }
        @keyframes heartPop { 
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .post-actions { display: flex; gap: 16px; padding: 12px 16px; font-size: 24px; }
        .post-actions i { cursor: pointer; transition: transform 0.2s; }
        .post-actions i:active { transform: scale(1.2); }
        .fa-heart.liked { color: var(--red); }

        .post-content { padding: 0 16px 15px; font-size: 14px; }
        .likes-count { font-weight: 700; margin-bottom: 6px; display: block; }
        .caption b { font-weight: 600; margin-right: 5px; }
        .post-date { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 8px; }

        /* DETAILS SECTION */
        .event-card { margin: 15px 16px; padding: 20px; border-radius: 15px; border: 1px solid var(--border); background: #fafafa; }
        .event-card h3 { font-size: 14px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .event-item { display: flex; gap: 15px; margin-bottom: 15px; }
        .event-icon { font-size: 20px; width: 30px; }

        /* FLOATING MUSIC */
        .music-floater { position: fixed; bottom: 85px; right: 20px; width: 45px; height: 45px; background: rgba(255,255,255,0.9); border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; z-index: 90; cursor: pointer; }
        .rotating { animation: rotate 4s linear infinite; }
        @keyframes rotate { from {transform: rotate(0)} to {transform: rotate(360deg)} }

        /* FOOTER NAV */
        .footer-nav { position: sticky; bottom: 0; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0; font-size: 22px; z-index: 100; }
        
        .reveal { opacity: 0; transform: translateY(20px); transition: 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<div id="cover" class="cover">
    <div class="cover-card">
        <p style="text-transform:uppercase; letter-spacing: 3px; font-size: 10px; margin-bottom: 10px; opacity: 0.8;">The Wedding Invitation</p>
        <h1 id="coverNames" class="cover-name">Budi & Ani</h1>
        <div style="margin: 25px 0;">
            <p style="font-size: 12px; opacity: 0.7;">Kepada Yth:</p>
            <p id="guestName" style="font-size: 18px; font-weight: 600; margin-top: 5px;"></p>
        </div>
        <button class="cover-btn" onclick="startInvitation()">Buka Undangan</button>
    </div>
</div>

<nav class="navbar">
    <div class="nav-logo">Instagram</div>
    <div style="display: flex; gap: 20px; font-size: 20px;">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-regular fa-paper-plane"></i>
    </div>
</nav>

<div id="stories" class="stories">
    <!-- Story items will be injected here -->
</div>

<div id="feed">
    <!-- Post items will be injected here -->
</div>

<section class="reveal">
    <div class="event-card">
        <h3>INFORMASI ACARA</h3>
        <div id="eventList"></div>
    </div>
</section>

<div class="footer-nav">
    <i class="fa-solid fa-house"></i>
    <i class="fa-solid fa-magnifying-glass"></i>
    <i class="fa-regular fa-square-plus"></i>
    <i class="fa-solid fa-clapperboard"></i>
    <i class="fa-regular fa-circle-user"></i>
</div>

<div class="music-floater" id="musicBtn" onclick="toggleMusic()">
    <i class="fa-solid fa-compact-disc rotating"></i>
</div>
<audio id="myAudio" loop></audio>

<script>
    const params = new URLSearchParams(window.location.search);
    const c = params.get('c');
    const to = (params.get('to') || 'Tamu Undangan').replace(/\+/g, ' ');
    const path = `../../public/clients/${c}/`;

    document.getElementById('guestName').innerText = to;

    fetch(`${path}data.json`).then(r => r.json()).then(data => {
        const { couple: cp, events: evs, gallery: gl, quote, logistics: lg } = data;
        const pairNick = `${cp.groom.nickname} & ${cp.bride.nickname}`;
        const igUser = `${cp.groom.nickname.toLowerCase()}_${cp.bride.nickname.toLowerCase()}`;

        document.getElementById('coverNames').innerText = pairNick;
        if(lg.music) document.getElementById('myAudio').src = path + lg.music;

        // RENDER STORIES
        const storyBox = document.getElementById('stories');
        const storyItems = ['Our Story', 'Akad', 'Resepsi', 'Gallery', 'Gift'];
        gl.album.slice(0, 5).forEach((img, i) => {
            storyBox.innerHTML += `
                <div class="story">
                    <div class="story-ring"><img src="${path + img}"></div>
                    <p class="story-name">${storyItems[i]}</p>
                </div>`;
        });

        // RENDER FEED (Maksimalisasi Caption & Post)
        const feed = document.getElementById('feed');
        gl.album.forEach((img, i) => {
            const isLiked = i === 0; // Post pertama otomatis like
            feed.innerHTML += `
                <div class="post reveal">
                    <div class="post-header">
                        <div class="post-avatar"><img src="${path + cp.groom.image}"></div>
                        <div class="post-info">
                            <p class="post-user">${igUser}</p>
                            <p class="post-loc">${evs[0].address.split(',')[0]}</p>
                        </div>
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>
                    <div class="post-img-container" ondblclick="handleDoubleTap(this, ${i})">
                        <img src="${path + img}" loading="lazy">
                        <i class="fa-solid fa-heart big-heart" id="heart-anim-${i}"></i>
                    </div>
                    <div class="post-actions">
                        <i class="${isLiked ? 'fa-solid fa-heart liked' : 'fa-regular fa-heart'}" onclick="handleLike(this)"></i>
                        <i class="fa-regular fa-comment"></i>
                        <i class="fa-regular fa-paper-plane"></i>
                        <i class="fa-regular fa-bookmark" style="margin-left: auto;"></i>
                    </div>
                    <div class="post-content">
                        <span class="likes-count">${(1200 + i * 45).toLocaleString('id')} suka</span>
                        <p class="caption"><b>${igUser}</b> ${i === 0 ? quote.text : 'Bahagia itu sederhana, bersamamu salah satunya. ✨ #weddingday'}</p>
                        <p class="post-date">${i + 1} HARI YANG LALU</p>
                    </div>
                </div>`;
        });

        // RENDER EVENTS
        const eventList = document.getElementById('eventList');
        evs.forEach(e => {
            eventList.innerHTML += `
                <div class="event-item">
                    <div class="event-icon">${e.title.includes('Akad') ? '💍' : '🍴'}</div>
                    <div class="event-body">
                        <p style="font-weight:700; font-size:13px">${e.title}</p>
                        <p style="font-size:12px; color:#666">${new Date(e.date).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}</p>
                        <p style="font-size:12px; color:#666">${e.startTime} - Selesai</p>
                        <p style="font-size:11px; margin-top:5px; color:var(--blue)">Lihat di Google Maps →</p>
                    </div>
                </div>`;
        });

        initScrollReveal();
    });

    function startInvitation() {
        document.getElementById('cover').classList.add('hidden');
        const audio = document.getElementById('myAudio');
        audio.play().catch(() => {});
    }

    function handleLike(el) {
        el.classList.toggle('fa-regular');
        el.classList.toggle('fa-solid');
        el.classList.toggle('liked');
    }

    function handleDoubleTap(container, id) {
        const heart = document.getElementById(`heart-anim-${id}`);
        const likeBtn = container.nextElementSibling.querySelector('.fa-heart');
        
        heart.classList.add('animate-heart');
        setTimeout(() => heart.classList.remove('animate-heart'), 800);
        
        if(!likeBtn.classList.contains('liked')) {
            handleLike(likeBtn);
        }
    }

    function toggleMusic() {
        const audio = document.getElementById('myAudio');
        const icon = document.getElementById('musicBtn').querySelector('i');
        if(audio.paused) {
            audio.play();
            icon.classList.add('rotating');
        } else {
            audio.pause();
            icon.classList.remove('rotating');
        }
    }

    function initScrollReveal() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) entry.target.classList.add('active');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }
</script>
</body>
</html>
