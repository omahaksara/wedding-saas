<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Undangan Instagram</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#fafafa;--card:#fff;--text:#262626;--muted:#8e8e8e;--border:#dbdbdb;
  --blue:#0095f6;--red:#ed4956;--blur:blur(20px) saturate(180%);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);
  max-width:470px;margin:0 auto;min-height:100vh;
}

/* COVER */
.cover{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;
  background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  transition:opacity.6s,visibility.6s}
.cover.hidden{opacity:0;visibility:hidden}
.cover-card{background:rgba(255,255,255,.2);backdrop-filter:var(--blur);border:1px solid rgba(255,255,255,.3);
  border-radius:24px;padding:32px 28px;text-align:center;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.cover-title{font-size:28px;font-weight:700;margin-bottom:8px}
.cover-to{font-size:14px;opacity:.9;margin-bottom:20px}
.cover-btn{background:#fff;color:#262626;padding:14px 32px;border-radius:12px;border:none;font-weight:600;font-size:15px;cursor:pointer;
  transition:all.3s cubic-bezier(0.165, 0.84, 0.44, 1)}
.cover-btn:active{transform:scale(.96)}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.8);backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:24px;font-weight:700}
.nav-icons{display:flex;gap:20px;font-size:24px}

/* STORIES */
.stories{display:flex;gap:16px;padding:16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.stories::-webkit-scrollbar{display:none}
.story{flex:0 0 auto;text-align:center;cursor:pointer}
.story-ring{width:66px;height:66px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  padding:2px;margin-bottom:6px}
.story-ring img{width:100%;height:100%;border-radius:50%;border:2px solid var(--card);object-fit:cover}
.story-name{font-size:11px;color:var(--text)}

/* POST */
.post{background:var(--card);border-bottom:1px solid var(--border);margin-bottom:8px}
.post-header{display:flex;align-items:center;gap:12px;padding:14px 16px}
.post-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(45deg,#f09433,#dc2743);padding:2px}
.post-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.post-user{flex:1}
.post-name{font-size:14px;font-weight:600}
.post-location{font-size:12px;color:var(--muted)}
.post-image{position:relative;aspect-ratio:1/1;background:#000;overflow:hidden}
.post-image img{width:100%;height:100%;object-fit:cover}
.double-tap-heart{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:80px;color:#fff;opacity:0;pointer-events:none;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.3))}
.double-tap-heart.active{animation:heartPop.8s cubic-bezier(0.165, 0.84, 0.44, 1)}
@keyframes heartPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}15%{transform:translate(-50%,-50%) scale(1.2);opacity:1}30%{transform:translate(-50%,-50%) scale(.95)}45%,80%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}

.post-actions{display:flex;align-items:center;gap:16px;padding:12px 16px 8px;font-size:26px}
.action-btn{cursor:pointer;transition:all.2s cubic-bezier(0.165, 0.84, 0.44, 1)}
.action-btn:active{transform:scale(.9)}
.like-btn.liked{color:var(--red);animation:likeAnim.3s}
@keyframes likeAnim{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.save-btn{margin-left:auto}
.post-likes{padding:0 16px;font-size:14px;font-weight:600;margin-bottom:8px}
.post-caption{padding:0 16px;font-size:14px;line-height:1.4;margin-bottom:4px}
.post-caption b{font-weight:600}
.post-time{padding:0 16px 12px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.2px}

/* COMMENTS */
.comments{max-height:0;overflow:hidden;transition:max-height.4s cubic-bezier(0.165, 0.84, 0.44, 1)}
.comments.show{max-height:300px}
.comment-list{padding:0 16px 8px}
.comment{display:flex;gap:12px;margin-bottom:12px;font-size:14px;animation:slideUp.4s}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:#ddd;flex-shrink:0}
.comment-body{flex:1}
.comment-body b{font-weight:600;margin-right:6px}
.comment-input{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--border)}
.comment-input input{flex:1;border:none;outline:none;font-size:14px;background:transparent}
.comment-input button{border:none;background:none;color:var(--blue);font-weight:600;font-size:14px;cursor:pointer;opacity:.3;pointer-events:none;transition:.2s}
.comment-input button.active{opacity:1;pointer-events:auto}

/* DETAILS */
.details{background:var(--card);margin:8px 0;padding:20px 16px;border-bottom:1px solid var(--border)}
.details h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.detail-item{display:flex;gap:12px;margin-bottom:16px;font-size:14px}
.detail-icon{font-size:20px}
.detail-body b{display:block;font-weight:600;margin-bottom:2px}
.detail-body span{color:var(--muted);font-size:13px}

/* BOTTOM NAV */
.bottom-nav{position:sticky;bottom:0;z-index:40;background:rgba(255,255,255,.8);backdrop-filter:var(--blur);
  border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:12px 0;font-size:26px}

/* MUSIC */
.music-player{position:fixed;bottom:70px;right:16px;z-index:60;width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,.9);backdrop-filter:var(--blur);box-shadow:0 4px 20px rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;
  transition:all.3s cubic-bezier(0.165, 0.84, 0.44, 1)}
.music-player:active{transform:scale(.9)}
.music-player.playing{animation:spin 3s linear infinite}
@keyframes spin{100%{transform:rotate(360deg)}}

.reveal{opacity:0;transform:translateY(20px);transition:all.6s cubic-bezier(0.165, 0.84, 0.44, 1)}
.reveal.show{opacity:1;transform:translateY(0)}
</style>
</head>

<body>

<!-- COVER -->
<div class="cover" id="cover">
  <div class="cover-card">
    <div class="cover-title" id="coverNames">Budi & Ani</div>
    <div class="cover-to" id="coverTo">Kepada Yth.<br>Bapak/Ibu/Saudara/i</div>
    <button class="cover-btn" onclick="openInvite()">Buka Undangan</button>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-logo">Instagram</div>
  <div class="nav-icons"><span>🤍</span><span>💬</span></div>
</div>

<!-- STORIES - AUTO DARI FOTO -->
<div class="stories" id="stories"></div>

<!-- FEED - AUTO GENERATE DARI FOTO CLIENT -->
<div id="feed"></div>

<!-- DETAILS -->
<div class="details reveal">
  <h3>📅 Detail Acara</h3>
  <div id="eventDetails"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <span>🏠</span><span>🔍</span><span>➕</span><span>🎬</span><span>👤</span>
</div>

<!-- MUSIC -->
<div class="music-player" id="musicBtn" onclick="toggleMusic()">🎵</div>
<audio id="bgMusic" loop></audio>

<script>
// AMBIL PARAM URL
const params = new URLSearchParams(window.location.search);
const clientSlug = params.get('c') || 'budi-ani';
const guestName = params.get('to') || 'Tamu Undangan';
const basePath = `/clients/${clientSlug}`;

// LOAD DATA.JSON
let clientData = {};
async function loadData(){
  try{
    const res = await fetch(`${basePath}/data.json`);
    clientData = await res.json();
    renderCover();
    renderStories();
    renderFeed();
    renderDetails();
    loadMusic();
  }catch(e){
    console.error('Gagal load data.json',e);
  }
}

// COVER
function renderCover(){
  document.getElementById('coverNames').textContent = `${clientData.couple?.groom?.nickname || 'Groom'} & ${clientData.couple?.bride?.nickname || 'Bride'}`;
  document.getElementById('coverTo').innerHTML = `Kepada Yth.<br>${guestName}`;
}

function openInvite(){
  document.getElementById('cover').classList.add('hidden');
  document.getElementById('bgMusic').play().catch(()=>{});
  document.getElementById('musicBtn').classList.add('playing');
}

// STORIES DARI GALLERY
function renderStories(){
  const stories = document.getElementById('stories');
  const photos = clientData.gallery?.album || [];
  photos.slice(0,5).forEach((img,i)=>{
    const div = document.createElement('div');
    div.className = 'story';
    div.innerHTML = `
      <div class="story-ring"><img src="${basePath}/${img}" alt=""></div>
      <div class="story-name">${['Prewed','Akad','Resepsi','Venue','Detail'][i]||'Story'}</div>`;
    stories.appendChild(div);
  });
}

// FEED AUTO GENERATE DARI FOTO
function renderFeed(){
  const feed = document.getElementById('feed');
  const photos = clientData.gallery?.album || [];
  const username = `${clientData.couple?.groom?.nickname||'groom'}_${clientData.couple?.bride?.nickname||'bride'}_wedding`.toLowerCase();
  
  photos.forEach((img,i)=>{
    const post = document.createElement('div');
    post.className = 'post reveal';
    post.innerHTML = `
      <div class="post-header">
        <div class="post-avatar"><img src="${basePath}/${clientData.couple?.groom?.image||img}" alt=""></div>
        <div class="post-user">
          <div class="post-name">${username}</div>
          <div class="post-location">${clientData.events?.[0]?.address?.split(',')[0]||'Indonesia'}</div>
        </div>
        <div style="font-size:20px">⋯</div>
      </div>
      <div class="post-image" ondblclick="doubleTapLike(${i})">
        <img src="${basePath}/${img}" alt="">
        <div class="double-tap-heart" id="heart${i}">❤️</div>
      </div>
      <div class="post-actions">
        <div class="action-btn like-btn" onclick="toggleLike(this,${i})">🤍</div>
        <div class="action-btn" onclick="toggleComments(${i})">💬</div>
        <div class="action-btn">📤</div>
        <div class="action-btn save-btn">🔖</div>
      </div>
      <div class="post-likes"><span id="likeCount${i}">${Math.floor(Math.random()*2000)+500}</span> likes</div>
      <div class="post-caption">
        <b>${username}</b> ${i===0? clientData.quote?.text||'Bismillah. Kami mengundang Anda.' : 'Momen bahagia kami ❤️'}
        <br><br><span style="color:var(--blue)">#${clientData.couple?.groom?.nickname||''}${clientData.couple?.bride?.nickname||''}Day #Wedding</span>
      </div>
      <div class="post-time">${i+1} HARI YANG LALU</div>
      <div class="comments" id="comments${i}">
        <div class="comment-list" id="commentList${i}"></div>
        <div class="comment-input">
          <input type="text" id="commentInput${i}" placeholder="Tambahkan komentar..." oninput="checkComment(${i})">
          <button id="sendComment${i}" onclick="addComment(${i})">Kirim</button>
        </div>
      </div>`;
    feed.appendChild(post);
  });
  
  document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));
}

// DETAILS
function renderDetails(){
  const wrap = document.getElementById('eventDetails');
  clientData.events?.forEach(ev=>{
    const div = document.createElement('div');
    div.className = 'detail-item';
    div.innerHTML = `
      <div class="detail-icon">${ev.title.includes('Akad')?'💍':'🎉'}</div>
      <div class="detail-body">
        <b>${ev.title}</b>
        <span>${ev.date} • ${ev.startTime} ${ev.timezone}<br>${ev.address} • <a href="${ev.googleMaps}" target="_blank" style="color:var(--blue)">Maps</a></span>
      </div>`;
    wrap.appendChild(div);
  });
}

// MUSIC
function loadMusic(){
  if(clientData.logistics?.music){
    document.getElementById('bgMusic').src = `${basePath}/${clientData.logistics.music}`;
  }
}
function toggleMusic(){
  const music = document.getElementById('bgMusic');
  const btn = document.getElementById('musicBtn');
  if(music.paused){music.play();btn.classList.add('playing')}
  else{music.pause();btn.classList.remove('playing')}
}

// LIKE
const likes = {};
function toggleLike(btn,i){
  likes[i] =!likes[i];
  const count = document.getElementById(`likeCount${i}`);
  let num = parseInt(count.textContent.replace(/,/g,''));
  if(likes[i]){btn.textContent='❤️';btn.classList.add('liked');num++}
  else{btn.textContent='🤍';btn.classList.remove('liked');num--}
  count.textContent = num.toLocaleString('id');
}

function doubleTapLike(i){
  const heart = document.getElementById(`heart${i}`);
  heart.classList.remove('active');
  void heart.offsetWidth;
  heart.classList.add('active');
  if(!likes[i]) document.querySelectorAll('.like-btn')[i].click();
}

// COMMENTS
function toggleComments(i){
  document.getElementById(`comments${i}`).classList.toggle('show');
}
function checkComment(i){
  const val = document.getElementById(`commentInput${i}`).value.trim();
  document.getElementById(`sendComment${i}`).classList.toggle('active',val.length>0);
}
function addComment(i){
  const input = document.getElementById(`commentInput${i}`);
  const text = input.value.trim();
  if(!text) return;
  const list = document.getElementById(`commentList${i}`);
  const div = document.createElement('div');
  div.className = 'comment';
  div.innerHTML = `
    <div class="comment-avatar" style="background:linear-gradient(45deg,#0095f6,#00d4ff)"></div>
    <div class="comment-body"><b>${guestName}</b> ${text}<div class="comment-time">Baru saja</div></div>`;
  list.appendChild(div);
  input.value = '';
  checkComment(i);
}

// SCROLL REVEAL
const revealObs = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting){e.target.classList.add('show');revealObs.unobserve(e.target)}
  });
},{threshold:.1});

// INIT
loadData();
</script>

</body>
</html>
