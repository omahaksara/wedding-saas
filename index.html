<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Wedding Invitation | Omah Aksara</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050505;
--card:rgba(255,255,255,.05);
--line:rgba(212,175,55,.18);
--gold:#d4af37;
--gold2:#f7e7a9;
--white:#ffffff;
--soft:rgba(255,255,255,.72);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:Montserrat,sans-serif;
background:var(--bg);
color:#fff;
overflow-x:hidden;
}

img{
display:block;
max-width:100%;
}

a{
text-decoration:none;
color:inherit;
}

#loader{
position:fixed;
inset:0;
background:#000;
z-index:99999;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:18px;
}

.spin{
width:42px;
height:42px;
border:3px solid rgba(255,255,255,.1);
border-top:3px solid var(--gold);
border-radius:50%;
animation:putar 1s linear infinite;
}

@keyframes putar{
to{transform:rotate(360deg)}
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
background-size:cover;
background-position:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.25),rgba(0,0,0,.88));
}

.hero-box{
position:relative;
z-index:2;
width:100%;
max-width:560px;
padding:38px 24px;
border-radius:30px;
background:rgba(0,0,0,.28);
backdrop-filter:blur(12px);
border:1px solid rgba(212,175,55,.22);
}

.top-mini{
font-size:.72rem;
letter-spacing:5px;
color:var(--gold2);
}

h1{
font-family:"Cormorant Garamond",serif;
font-size:clamp(3rem,11vw,5rem);
margin:12px 0 18px;
line-height:1;
}

.to{
font-size:.9rem;
opacity:.75;
}

.guest{
font-size:1.25rem;
font-weight:700;
margin:10px 0 26px;
}

.btn{
display:inline-block;
padding:15px 28px;
border:none;
cursor:pointer;
border-radius:999px;
font-weight:700;
letter-spacing:1px;
font-size:.88rem;
background:linear-gradient(45deg,var(--gold),var(--gold2));
color:#111;
}

main{
display:none;
}

section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

.sec-sub{
text-align:center;
font-size:.72rem;
letter-spacing:5px;
color:rgba(255,255,255,.55);
margin-bottom:8px;
}

.sec-title{
text-align:center;
font-family:"Cormorant Garamond",serif;
font-size:3rem;
color:var(--gold2);
margin-bottom:40px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:24px;
padding:26px;
}

.couple{
display:grid;
grid-template-columns:1fr auto 1fr;
gap:40px;
align-items:center;
}

.person{
text-align:center;
}

.frame{
padding:8px;
border-radius:160px 160px 26px 26px;
background:linear-gradient(145deg,#d4af37,#f7e7a9,#aa7d14);
box-shadow:0 20px 50px rgba(0,0,0,.35);
display:inline-block;
}

.photo{
width:260px;
height:350px;
object-fit:cover;
border-radius:150px 150px 20px 20px;
}

.and{
font-family:"Cormorant Garamond",serif;
font-size:5rem;
color:var(--gold);
}

.pname{
font-size:1.5rem;
margin-top:20px;
font-weight:700;
}

.parent{
margin-top:10px;
font-size:.92rem;
line-height:1.8;
color:var(--soft);
}

.countdown{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.cd{
padding:18px 8px;
text-align:center;
border-radius:18px;
background:#0f0f0f;
border:1px solid var(--line);
}

.num{
font-size:1.5rem;
font-weight:700;
color:var(--gold2);
}

.lab{
font-size:.72rem;
opacity:.7;
margin-top:6px;
}

.grid2{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.label{
font-size:.72rem;
letter-spacing:3px;
color:var(--gold2);
margin-bottom:12px;
}

.text{
line-height:1.8;
color:var(--soft);
}

.story{
display:grid;
gap:18px;
}

.story img{
width:100%;
height:260px;
object-fit:cover;
border-radius:18px;
margin-bottom:14px;
}

.btn-dark{
background:#161616;
color:#fff;
border:1px solid rgba(255,255,255,.08);
margin-top:15px;
}

.actions{
display:grid;
gap:12px;
margin-top:14px;
}

.floating{
position:fixed;
right:18px;
bottom:18px;
display:none;
flex-direction:column;
gap:12px;
z-index:999;
}

.fab{
width:52px;
height:52px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(45deg,var(--gold),var(--gold2));
color:#111;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 28px rgba(0,0,0,.35);
}

footer{
padding:50px 20px;
text-align:center;
font-size:.72rem;
letter-spacing:3px;
opacity:.45;
}

.toast{
position:fixed;
left:50%;
bottom:25px;
transform:translateX(-50%);
background:#111;
padding:12px 18px;
border-radius:999px;
border:1px solid var(--line);
display:none;
z-index:9999;
font-size:.85rem;
}

@media(max-width:820px){
.couple,.grid2{
grid-template-columns:1fr;
}
.and{
font-size:3rem;
}
.photo{
width:225px;
height:305px;
}
.sec-title{
font-size:2.5rem;
}
}
</style>
</head>
<body>

<div id="loader">
<div class="spin"></div>
<div style="font-size:.85rem;opacity:.7">Memuat Undangan...</div>
</div>

<div class="toast" id="toast"></div>

<audio id="bgm" loop>
<source id="musicSrc" src="">
</audio>

<header class="hero" id="hero">
<div class="hero-box">
<div class="top-mini">THE WEDDING OF</div>
<h1 id="heroTitle">Loading...</h1>
<div class="to">Kepada Yth.</div>
<div class="guest" id="guestName">Tamu Undangan</div>
<button class="btn" onclick="openInvitation()">BUKA UNDANGAN</button>
</div>
</header>

<main id="main">

<section>
<div class="sec-sub">THE BRIDE & GROOM</div>
<div class="sec-title">Mempelai</div>

<div class="couple">

<div class="person">
<div class="frame"><img id="malePhoto" class="photo"></div>
<div class="pname" id="maleName"></div>
<div class="parent" id="maleParent"></div>
</div>

<div class="and">&</div>

<div class="person">
<div class="frame"><img id="femalePhoto" class="photo"></div>
<div class="pname" id="femaleName"></div>
<div class="parent" id="femaleParent"></div>
</div>

</div>
</section>

<section>
<div class="sec-sub">SAVE THE DATE</div>
<div class="sec-title">Hari Bahagia</div>

<div class="card">
<div class="text" id="dateText" style="text-align:center;margin-bottom:22px"></div>

<div class="countdown">
<div class="cd"><div class="num" id="d">00</div><div class="lab">Hari</div></div>
<div class="cd"><div class="num" id="h">00</div><div class="lab">Jam</div></div>
<div class="cd"><div class="num" id="m">00</div><div class="lab">Menit</div></div>
<div class="cd"><div class="num" id="s">00</div><div class="lab">Detik</div></div>
</div>
</div>
</section>

<section>
<div class="sec-sub">EVENT DETAILS</div>
<div class="sec-title">Acara</div>

<div class="grid2">

<div class="card">
<div class="label">AKAD</div>
<div class="text" id="akadDate"></div>
<div class="text" id="akadLoc"></div>
<div class="actions">
<a class="btn btn-dark" target="_blank" id="akadMap">Buka Maps</a>
</div>
</div>

<div class="card">
<div class="label">RESEPSI</div>
<div class="text" id="resepsiDate"></div>
<div class="text" id="resepsiLoc"></div>
<div class="actions">
<a class="btn btn-dark" target="_blank" id="resepsiMap">Buka Maps</a>
</div>
</div>

</div>
</section>

<section id="storySection">
<div class="sec-sub">OUR STORY</div>
<div class="sec-title">Cerita Kami</div>
<div class="story" id="storyWrap"></div>
</section>

<section>
<div class="sec-sub">WEDDING GIFT</div>
<div class="sec-title">Kado Digital</div>

<div class="card" style="max-width:620px;margin:auto">
<div class="text" id="giftData" style="margin-bottom:16px;text-align:center"></div>
<div class="actions">
<button class="btn" onclick="copyGift()">SALIN REKENING</button>
<button class="btn btn-dark" onclick="shareInvite()">SHARE UNDANGAN</button>
</div>
</div>
</section>

<footer>DESIGNED BY OMAH AKSARA</footer>

</main>

<div class="floating" id="floating">
<div class="fab" onclick="toggleMusic()">♫</div>
<div class="fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbz3S69wLBYLgy9KydJfwPM6ZThMiAHpmRgnhN_Vv7_YM2k5VC9x5xJbmhy3UDPevIViig/exec";

const params=new URLSearchParams(location.search);
const slug=params.get("u") || "zeya-putra";
const guest=params.get("to") || "Tamu Undangan";

let targetTime=0;
let giftText="";

guestName.innerText=decodeURIComponent(guest.replace(/\+/g," "));

function fw(t){ return t ? t.split(" ")[0] : ""; }

function showToast(msg){
toast.innerText=msg;
toast.style.display="block";
setTimeout(()=>toast.style.display="none",2200);
}

function fmtDate(v){
if(!v) return "-";
return new Date(v).toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}

function fmtDateTime(v){
if(!v) return "-";
const x=new Date(v);
return x.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+
" • "+
x.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
}

async function init(){
try{

const res=await fetch(API+"?u="+encodeURIComponent(slug));
const json=await res.json();

if(!json.status || !json.data || json.data.length===0){
loader.innerHTML="Data tidak ditemukan";
return;
}

const dta=json.data[0];

hero.style.backgroundImage=
"linear-gradient(rgba(0,0,0,.25),rgba(0,0,0,.88)),url('"+dta.foto_sampul+"')";

heroTitle.innerText=fw(dta.pria_nama)+" & "+fw(dta.wanita_nama);

malePhoto.src=dta.pria_foto||"";
maleName.innerText=dta.pria_nama||"";
maleParent.innerText=dta.pria_ortu||"";

femalePhoto.src=dta.wanita_foto||"";
femaleName.innerText=dta.wanita_nama||"";
femaleParent.innerText=dta.wanita_ortu||"";

dateText.innerText=fmtDate(dta.waktu_display);

akadDate.innerText=fmtDateTime(dta.akad_tgl);
akadLoc.innerText=dta.akad_lokasi||"-";
akadMap.href=dta.map_akad||"#";

resepsiDate.innerText=fmtDateTime(dta.resepsi_tgl);
resepsiLoc.innerText=dta.resepsi_lokasi||"-";
resepsiMap.href=dta.map_resepsi||"#";

giftText=dta.bank_data||"-";
giftData.innerText=giftText;

musicSrc.src=dta.musik_url||"";
bgm.load();

renderStory(dta);

targetTime=new Date(dta.waktu_countdown).getTime();
startCountdown();

loader.style.display="none";

}catch(e){
loader.innerHTML="Gagal memuat data";
console.log(e);
}
}

function renderStory(d){
let html="";

for(let i=1;i<=3;i++){
const tx=d["cerita_"+i+"_teks"];
const im=d["foto_cerita_"+i];

if(tx){
html+=`
<div class="card">
${im ? `<img src="${im}">` : ``}
<div class="text">${tx}</div>
</div>`;
}
}

storyWrap.innerHTML=html;
if(html===""){
storySection.style.display="none";
}
}

function startCountdown(){
setInterval(()=>{
if(!targetTime) return;
const now=Date.now();
const diff=targetTime-now;
if(diff<=0) return;

const day=Math.floor(diff/86400000);
const hr=Math.floor((diff%86400000)/3600000);
const mn=Math.floor((diff%3600000)/60000);
const sc=Math.floor((diff%60000)/1000);

d.innerText=String(day).padStart(2,"0");
h.innerText=String(hr).padStart(2,"0");
m.innerText=String(mn).padStart(2,"0");
s.innerText=String(sc).padStart(2,"0");
},1000);
}

function openInvitation(){
hero.style.display="none";
main.style.display="block";
floating.style.display="flex";
bgm.play().catch(()=>{});
window.scrollTo(0,0);
}

function toggleMusic(){
if(bgm.paused){
bgm.play();
showToast("Musik Diputar");
}else{
bgm.pause();
showToast("Musik Dijeda");
}
}

function copyGift(){
navigator.clipboard.writeText(giftText);
showToast("Rekening berhasil disalin");
}

function shareInvite(){
const url=location.href;
window.open("https://wa.me/?text="+encodeURIComponent("Undangan Pernikahan:\n"+url));
}

init();
</script>

</body>
</html>
