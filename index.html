<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wedding Invitation Sultan 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--gold:#C9A961;
--gold2:#EAD9B0;
--dark:#0b0b0b;
--card:#151515;
--text:#f5f5f5;
--soft:#999;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:#000;
color:var(--text);
font-family:Inter,sans-serif;
overflow-x:hidden;
}

/* hero */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?q=80&w=1600') center/cover;
}

.hero-box{
max-width:900px;
animation:fadeUp 1.4s ease forwards;
opacity:0;
transform:translateY(40px);
}

.hero-sub{
letter-spacing:8px;
font-size:12px;
color:var(--gold2);
margin-bottom:20px;
text-transform:uppercase;
}

.hero-title{
font-family:"Cormorant Garamond",serif;
font-size:clamp(52px,10vw,110px);
font-weight:300;
line-height:1;
background:linear-gradient(135deg,var(--gold),#fff,var(--gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

.hero-date{
letter-spacing:4px;
color:#ddd;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:16px 38px;
border:1px solid var(--gold);
color:var(--gold);
text-decoration:none;
font-size:12px;
letter-spacing:3px;
transition:.4s;
text-transform:uppercase;
cursor:pointer;
background:transparent;
}

.btn:hover{
background:var(--gold);
color:#000;
transform:translateY(-3px);
}

/* section */
section{
padding:110px 20px;
max-width:1300px;
margin:auto;
}

.subtitle{
text-align:center;
font-size:11px;
letter-spacing:5px;
color:var(--gold);
margin-bottom:15px;
text-transform:uppercase;
}

.title{
text-align:center;
font-family:"Cormorant Garamond",serif;
font-size:clamp(42px,7vw,70px);
font-weight:300;
margin-bottom:70px;
}

/* mempelai sultan */
.couple-wrap{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
gap:70px;
align-items:center;
}

.couple-card{
text-align:center;
opacity:0;
transform:translateY(80px);
transition:1s;
}

.couple-card.show{
opacity:1;
transform:translateY(0);
}

.frame{
position:relative;
width:340px;
height:470px;
margin:auto auto 35px;
padding:14px;
border-radius:18px;
background:rgba(255,255,255,.05);
backdrop-filter:blur(18px);
overflow:hidden;
box-shadow:
0 30px 80px rgba(0,0,0,.7),
0 0 40px rgba(201,169,97,.08);
}

/* gold moving border */
.frame::before{
content:'';
position:absolute;
inset:-2px;
background:linear-gradient(130deg,var(--gold),transparent,var(--gold2),transparent,var(--gold));
background-size:300% 300%;
animation:borderMove 8s linear infinite;
z-index:0;
}

.frame::after{
content:'❦';
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:24px;
color:rgba(255,255,255,.6);
z-index:3;
}

.frame-inner{
position:relative;
z-index:2;
width:100%;
height:100%;
overflow:hidden;
border-radius:12px;
background:#111;
}

.frame img{
width:100%;
height:100%;
object-fit:cover;
transition:1.2s;
filter:brightness(.9) contrast(1.05);
}

.frame:hover img{
transform:scale(1.08);
filter:brightness(1) contrast(1.08);
}

/* floating flower */
.flower{
position:absolute;
font-size:22px;
color:rgba(201,169,97,.45);
animation:float 5s ease-in-out infinite;
z-index:4;
}

.f1{top:20px;left:18px;}
.f2{bottom:18px;right:18px;animation-delay:1.5s;}

.couple-name{
font-family:"Cormorant Garamond",serif;
font-size:54px;
font-weight:300;
margin-bottom:14px;
text-shadow:0 0 25px rgba(201,169,97,.18);
}

.couple-parent{
color:#aaa;
line-height:1.9;
font-size:15px;
max-width:320px;
margin:auto;
}

/* countdown */
.countdown{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

.box{
padding:35px 20px;
background:var(--card);
text-align:center;
border:1px solid rgba(201,169,97,.12);
}

.num{
font-family:"Cormorant Garamond",serif;
font-size:58px;
color:var(--gold);
}

.label{
font-size:12px;
letter-spacing:3px;
color:#999;
text-transform:uppercase;
}

/* footer */
footer{
padding:80px 20px;
text-align:center;
color:#777;
border-top:1px solid rgba(255,255,255,.06);
}

/* anim */
@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes borderMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@media(max-width:768px){
.frame{
width:290px;
height:410px;
}
}
</style>
</head>
<body>

<section class="hero">
<div class="hero-box">
<div class="hero-sub">The Wedding Of</div>
<h1 class="hero-title" id="heroNama">Loading...</h1>
<div class="hero-date" id="heroTanggal">Loading...</div>
<button class="btn" onclick="document.getElementById('main').scrollIntoView()">Buka Undangan</button>
</div>
</section>

<main id="main">

<section>
<div class="subtitle">Kami Akan Menikah</div>
<div class="title">Mempelai</div>

<div class="couple-wrap">

<div class="couple-card reveal">
<div class="frame">
<div class="flower f1">✿</div>
<div class="flower f2">✿</div>
<div class="frame-inner">
<img id="fotoPria">
</div>
</div>
<div class="couple-name" id="namaPria">...</div>
<div class="couple-parent" id="ortuPria"></div>
</div>

<div class="couple-card reveal">
<div class="frame">
<div class="flower f1">✿</div>
<div class="flower f2">✿</div>
<div class="frame-inner">
<img id="fotoWanita">
</div>
</div>
<div class="couple-name" id="namaWanita">...</div>
<div class="couple-parent" id="ortuWanita"></div>
</div>

</div>
</section>

<section>
<div class="subtitle">Hitung Mundur</div>
<div class="title">Hari Bahagia</div>

<div class="countdown">
<div class="box"><div class="num" id="d">00</div><div class="label">Hari</div></div>
<div class="box"><div class="num" id="h">00</div><div class="label">Jam</div></div>
<div class="box"><div class="num" id="m">00</div><div class="label">Menit</div></div>
<div class="box"><div class="num" id="s">00</div><div class="label">Detik</div></div>
</div>
</section>

<footer>
Wedding Invitation • Sultan 2026 Edition
</footer>

</main>

<script>
const API="https://script.google.com/macros/s/AKfycbxFIRAkRUAG6_E4RUJtU4yq-dk1n079na6Kol3gctkU92VELtNFtSJrjryFPo5JBiAv8A/exec";

fetch(API)
.then(r=>r.json())
.then(res=>{

const d = Array.isArray(res)?res[0]:res;

document.getElementById("heroNama").textContent =
(d.pria_nama || "Mempelai Pria") + " & " +
(d.wanita_nama || "Mempelai Wanita");

document.getElementById("heroTanggal").textContent =
d.waktu_display || "Save The Date";

document.getElementById("namaPria").textContent = d.pria_nama || "-";
document.getElementById("namaWanita").textContent = d.wanita_nama || "-";

document.getElementById("ortuPria").textContent = d.pria_ortu || "";
document.getElementById("ortuWanita").textContent = d.wanita_ortu || "";

document.getElementById("fotoPria").src = d.pria_foto;
document.getElementById("fotoWanita").src = d.wanita_foto;

startCountdown(d.waktu_countdown);

})
.catch(()=>{
document.getElementById("heroNama").textContent="Data Tidak Terhubung";
});

function startCountdown(dateStr){
if(!dateStr)return;

const target = new Date(dateStr).getTime();

setInterval(()=>{
const now = new Date().getTime();
const gap = target-now;

if(gap<0)return;

const day = Math.floor(gap/86400000);
const hour = Math.floor((gap%86400000)/3600000);
const min = Math.floor((gap%3600000)/60000);
const sec = Math.floor((gap%60000)/1000);

d.textContent=day;
h.textContent=hour;
m.textContent=min;
s.textContent=sec;

},1000);
}

/* reveal scroll */
const io = new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add("show");
}
});
},{threshold:.2});

document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
</script>

</body>
</html>
