<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wedding Invitation | Omah Aksara</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--gold:#d4af37;
--gold2:#f6e7a8;
--dark:#0b0b0b;
--soft:#171717;
--white:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
background:#000;
color:#fff;
font-family:Montserrat,sans-serif;
overflow-x:hidden;
}

#loader{
position:fixed;
inset:0;
background:#000;
z-index:99999;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
gap:15px;
}

.spin{
width:42px;
height:42px;
border:3px solid rgba(255,255,255,.15);
border-top:3px solid var(--gold);
border-radius:50%;
animation:putar 1s linear infinite;
}

@keyframes putar{
to{transform:rotate(360deg)}
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
text-align:center;
background-size:cover;
background-position:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.45),rgba(0,0,0,.88));
}

.hero-box{
position:relative;
z-index:2;
max-width:550px;
width:100%;
padding:35px 25px;
border:1px solid rgba(255,255,255,.1);
background:rgba(0,0,0,.35);
backdrop-filter:blur(8px);
border-radius:26px;
}

.small{
letter-spacing:4px;
font-size:.75rem;
opacity:.9;
margin-bottom:10px;
color:var(--gold2);
}

h1{
font-family:"Cormorant Garamond",serif;
font-size:clamp(3rem,10vw,5rem);
line-height:1;
margin-bottom:20px;
}

.guest{
padding:18px;
border-radius:18px;
background:rgba(255,255,255,.05);
margin:20px 0;
}

.btn{
border:none;
padding:15px 30px;
border-radius:50px;
cursor:pointer;
font-weight:700;
letter-spacing:2px;
background:linear-gradient(45deg,var(--gold),var(--gold2));
color:#111;
width:100%;
}

main{display:none;background:#070707}

section{
padding:70px 20px;
max-width:760px;
margin:auto;
}

.title{
font-family:"Cormorant Garamond",serif;
font-size:3rem;
text-align:center;
margin-bottom:35px;
color:var(--gold2);
}

.card{
background:linear-gradient(180deg,#121212,#0d0d0d);
border:1px solid rgba(212,175,55,.15);
border-radius:28px;
padding:28px;
margin-bottom:25px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.couple{
display:grid;
grid-template-columns:1fr;
gap:30px;
}

.person{
text-align:center;
}

.frame{
width:240px;
height:300px;
margin:auto;
padding:8px;
border-radius:140px 140px 30px 30px;
background:linear-gradient(145deg,var(--gold),#fff0b3,var(--gold));
box-shadow:0 15px 40px rgba(212,175,55,.18);
}

.frame img{
width:100%;
height:100%;
object-fit:cover;
border-radius:132px 132px 22px 22px;
display:block;
}

.name{
font-family:"Cormorant Garamond",serif;
font-size:2.1rem;
margin-top:18px;
}

.parent{
opacity:.75;
font-size:.95rem;
margin-top:8px;
line-height:1.7;
}

.count{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
text-align:center;
}

.box{
padding:18px 10px;
border-radius:18px;
background:#111;
border:1px solid rgba(212,175,55,.2);
}

.num{
font-size:1.7rem;
font-weight:700;
color:var(--gold2);
}

.story-img{
width:100%;
height:250px;
object-fit:cover;
border-radius:18px;
margin-bottom:15px;
}

.line{
height:1px;
background:rgba(255,255,255,.08);
margin:18px 0;
}

a.map{
display:inline-block;
margin-top:15px;
color:#111;
text-decoration:none;
padding:12px 22px;
border-radius:50px;
font-weight:700;
background:linear-gradient(45deg,var(--gold),var(--gold2));
}

.music{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border-radius:50%;
background:linear-gradient(45deg,var(--gold),var(--gold2));
color:#111;
display:none;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
cursor:pointer;
z-index:999;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

footer{
padding:40px 20px 70px;
text-align:center;
opacity:.5;
font-size:.8rem;
letter-spacing:3px;
}

@media(min-width:700px){
.couple{grid-template-columns:1fr 80px 1fr}
}
</style>
</head>
<body>

<div id="loader">
<div class="spin"></div>
<div>Memuat Undangan...</div>
</div>

<audio id="bgm" loop>
<source id="musicSrc" src="">
</audio>

<div class="music" id="musicBtn" onclick="toggleMusic()">♫</div>

<header class="hero" id="hero">
<div class="hero-box">
<div class="small">THE WEDDING OF</div>
<h1 id="heroName">Loading...</h1>

<div class="guest">
<div style="opacity:.8;font-size:.9rem">Kepada Yth.</div>
<div id="guestName" style="font-size:1.25rem;font-weight:700;margin-top:8px">Tamu Undangan</div>
</div>

<button class="btn" onclick="openInvite()">BUKA UNDANGAN</button>
</div>
</header>

<main id="main">

<section>
<div class="title">Mempelai</div>

<div class="couple">

<div class="person">
<div class="frame"><img id="malePhoto"></div>
<div class="name" id="maleName"></div>
<div class="parent" id="maleParent"></div>
</div>

<div style="display:flex;align-items:center;justify-content:center;font-family:Cormorant Garamond,serif;font-size:4rem;color:var(--gold)">
&
</div>

<div class="person">
<div class="frame"><img id="femalePhoto"></div>
<div class="name" id="femaleName"></div>
<div class="parent" id="femaleParent"></div>
</div>

</div>
</section>

<section>
<div class="title">Menuju Hari Bahagia</div>
<div class="card">
<div style="margin-bottom:20px" id="dateText"></div>
<div class="count">
<div class="box"><div class="num" id="d">00</div><small>Hari</small></div>
<div class="box"><div class="num" id="h">00</div><small>Jam</small></div>
<div class="box"><div class="num" id="m">00</div><small>Menit</small></div>
<div class="box"><div class="num" id="s">00</div><small>Detik</small></div>
</div>
</div>
</section>

<section>
<div class="title">Acara</div>

<div class="card">
<h3>Akad</h3>
<div class="line"></div>
<div id="akadDate"></div>
<div style="margin-top:10px" id="akadLoc"></div>
<a class="map" id="akadMap" target="_blank">Buka Maps</a>
</div>

<div class="card">
<h3>Resepsi</h3>
<div class="line"></div>
<div id="resDate"></div>
<div style="margin-top:10px" id="resLoc"></div>
<a class="map" id="resMap" target="_blank">Buka Maps</a>
</div>
</section>

<section>
<div class="title">Cerita Kami</div>
<div id="stories"></div>
</section>

<section>
<div class="title">Hadiah</div>
<div class="card">
<div id="giftBox"></div>
</div>
</section>

<footer>
DESIGNED BY OMAH AKSARA
</footer>

</main>

<script>
const API="https://script.google.com/macros/s/AKfycbzjvtqD1bgA-H4QEfKKzURo_J3NIc37TBkAdVT8VPSGQRDvc1adD9wmNkuRlZAQReVNqg/exec";

const q=new URLSearchParams(location.search);
const slug=q.get("u")||"zeya-putra";
const guest=q.get("to")||"Tamu Undangan";

document.getElementById("guestName").innerText=guest;

let targetDate=null;

function firstWord(x){
return (x||"").trim().split(" ")[0];
}

function formatDate(str){
if(!str) return "-";
const d=new Date(str);
if(isNaN(d)) return str;
return d.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}

async function init(){
try{
const res=await fetch(API+"?u="+encodeURIComponent(slug));
const json=await res.json();

if(!json.status || !json.data || json.data.length===0){
document.getElementById("loader").innerHTML="Data tidak ditemukan";
return;
}

const d=json.data[0];

document.getElementById("hero").style.backgroundImage=
`url('${d.foto_sampul}')`;

document.getElementById("heroName").innerText=
firstWord(d.pria_nama)+" & "+firstWord(d.wanita_nama);

malePhoto.src=d.pria_foto;
maleName.innerText=d.pria_nama;
maleParent.innerText=d.pria_ortu;

femalePhoto.src=d.wanita_foto;
femaleName.innerText=d.wanita_nama;
femaleParent.innerText=d.wanita_ortu;

dateText.innerText=d.waktu_display || formatDate(d.waktu_countdown);

akadDate.innerText=d.akad_tgl || "-";
akadLoc.innerText=d.akad_lokasi || "-";
akadMap.href=d.map_akad || "#";

resDate.innerText=d.resepsi_tgl || "-";
resLoc.innerText=d.resepsi_lokasi || "-";
resMap.href=d.map_resepsi || "#";

giftBox.innerText=d.bank_data || "-";

musicSrc.src=d.musik_url || "";
bgm.load();

let html="";
for(let i=1;i<=3;i++){
const txt=d["cerita_"+i+"_teks"];
const img=d["foto_cerita_"+i];
if(txt){
html+=`
<div class="card">
${img?`<img src="${img}" class="story-img">`:""}
<div>${txt}</div>
</div>
`;
}
}
stories.innerHTML=html;

targetDate=new Date(d.waktu_countdown);

document.getElementById("loader").style.display="none";

setInterval(runCountdown,1000);

}catch(err){
document.getElementById("loader").innerHTML="Gagal memuat data";
}
}

function runCountdown(){
if(!targetDate) return;
const now=new Date().getTime();
const diff=targetDate-now;

if(diff<0) return;

d.innerText=String(Math.floor(diff/86400000)).padStart(2,"0");
h.innerText=String(Math.floor(diff%86400000/3600000)).padStart(2,"0");
m.innerText=String(Math.floor(diff%3600000/60000)).padStart(2,"0");
s.innerText=String(Math.floor(diff%60000/1000)).padStart(2,"0");
}

function openInvite(){
hero.style.display="none";
main.style.display="block";
musicBtn.style.display="flex";
bgm.play().catch(()=>{});
window.scrollTo(0,0);
}

function toggleMusic(){
if(bgm.paused){
bgm.play();
musicBtn.innerText="♫";
}else{
bgm.pause();
musicBtn.innerText="✕";
}
}

init();
</script>

</body>
</html>
