<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Zeya Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --gold: #b08d57; --light-gold: #d4af37; --cream: #fdfaf7; --dark: #2c2c2c; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--cream); color: var(--dark); overflow-x: hidden; }
        
        /* COVER */
        #cover { height: 100vh; width: 100%; position: fixed; top: 0; z-index: 1000; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; transition: 1.5s cubic-bezier(0.65, 0, 0.35, 1); }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); }
        .cover-content { position: relative; color: white; text-align: center; padding: 20px; }
        .cover-content h1 { font-family: 'Alex Brush', cursive; font-size: 4.5rem; margin: 10px 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        /* COUNTDOWN */
        .countdown-container { display: flex; justify-content: center; gap: 12px; margin: 25px 0; }
        .count-item { background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); padding: 12px; border-radius: 12px; min-width: 70px; border: 1px solid rgba(255,255,255,0.3); }
        .count-item span { display: block; font-weight: bold; font-size: 1.4rem; }
        .count-item small { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; }

        /* BUTTONS */
        .btn-buka { padding: 15px 45px; background: var(--light-gold); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.3); transition: 0.3s; letter-spacing: 1px; }
        .btn-buka:hover { transform: scale(1.05); background: var(--gold); }
        
        /* SECTIONS */
        .hidden { display: none; }
        section { padding: 100px 25px; text-align: center; min-height: 100vh; }
        .section-title { font-family: 'Alex Brush', cursive; font-size: 3.5rem; color: var(--gold); margin-bottom: 40px; }
        
        /* CARD MEMPELAI */
        .mempelai-card { background: white; padding: 40px 20px; border-radius: 160px 160px 20px 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); margin-bottom: 50px; border: 1px solid #f1f1f1; position: relative; }
        .mempelai-img { width: 220px; height: 330px; object-fit: cover; border-radius: 110px 110px 10px 10px; border: 6px solid var(--light-gold); margin-bottom: 25px; }
        .ortu-text { font-size: 0.9rem; color: #777; line-height: 1.8; margin-top: 10px; }
        
        /* MUSIC BTN */
        #music-btn { position: fixed; top: 25px; right: 25px; width: 50px; height: 50px; background: var(--light-gold); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1100; animation: rotate 5s linear infinite; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* NAVIGATION */
        .navbar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); padding: 15px 35px; border-radius: 50px; display: flex; gap: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 900; }
        .navbar a { text-decoration: none; color: var(--gold); font-size: 0.7rem; font-weight: bold; text-align: center; transition: 0.3s; }
        .navbar i { display: block; font-size: 1.3rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <audio id="audio" loop></audio>
    
    <div id="music-btn" class="hidden" onclick="toggleMusic()"><i class="fas fa-compact-disc"></i></div>

    <div id="cover">
        <div class="overlay"></div>
        <div class="cover-content">
            <p class="animate__animated animate__fadeInDown">WEDDING INVITATION</p>
            <h1 id="cp_pria" class="animate__animated animate__zoomIn"></h1>
            <h2 style="font-family:'Alex Brush'; font-size:3rem; margin:-10px 0;">&</h2>
            <h1 id="cp_wanita" class="animate__animated animate__zoomIn"></h1>
            
            <div class="countdown-container" id="countdown">
                <div class="count-item"><span id="days">00</span><small>Hari</small></div>
                <div class="count-item"><span id="hours">00</span><small>Jam</small></div>
                <div class="count-item"><span id="mins">00</span><small>Menit</small></div>
                <div class="count-item"><span id="secs">00</span><small>Detik</small></div>
            </div>

            <button class="btn-buka animate__animated animate__fadeInUp" onclick="startApp()">
                <i class="fa-solid fa-envelope-open"></i> BUKA UNDANGAN
            </button>
        </div>
    </div>

    <main id="main-content" class="hidden">
        <section id="couple">
            <h2 class="section-title">Mempelai</h2>
            <div id="mempelai_container">
                </div>
        </section>

        <section id="event" style="background:#f9f6f1">
            <h2 class="section-title">Acara</h2>
            <div style="background:white; padding:50px 30px; border-radius:30px; border:1px solid #eee; max-width:500px; margin:0 auto; box-shadow: 0 20px 50px rgba(0,0,0,0.03)">
                <h3 style="letter-spacing:3px; color:var(--gold); font-size:1.5rem">AKAD NIKAH</h3>
                <div style="width:60px; height:2px; background:var(--light-gold); margin:20px auto"></div>
                <p id="e_tgl" style="font-weight:600; font-size:1.1rem"></p>
                <p id="e_jam" style="margin:10px 0"></p>
                <br>
                <p><b>Lokasi:</b></p>
                <p id="e_lok" style="margin-bottom:20px; font-size:0.9rem"></p>
                <a id="btn_peta" target="_blank">
                    <button class="btn-buka" style="padding:12px 30px; font-size:0.8rem">
                        <i class="fas fa-map-marker-alt"></i> LIHAT DI GOOGLE MAPS
                    </button>
                </a>
            </div>
        </section>

        <nav class="navbar">
            <a href="#cover" onclick="location.reload()"><i class="fas fa-home"></i>HOME</a>
            <a href="#couple"><i class="fas fa-heart"></i>COUPLE</a>
            <a href="#event"><i class="fas fa-calendar-alt"></i>EVENT</a>
        </nav>
    </main>

    <script>
        const audio = document.getElementById("audio");
        let isPlaying = true;

        function startApp() {
            document.getElementById("cover").style.transform = "translateY(-100%)";
            document.getElementById("main-content").classList.remove("hidden");
            document.getElementById("music-btn").classList.remove("hidden");
            audio.play().catch(() => console.log("Audio play needs interaction"));
        }

        function toggleMusic() {
            const btn = document.getElementById("music-btn");
            if(isPlaying) {
                audio.pause();
                btn.style.animationPlayState = "paused";
            } else {
                audio.play();
                btn.style.animationPlayState = "running";
            }
            isPlaying = !isPlaying;
        }

        // Fetch Data from JSON
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get("id") || "budi-ani";

        fetch("data.json").then(res => res.json()).then(data => {
            const d = data[id];
            if(!d) return;

            // Mapping Data to UI
            document.getElementById("cp_pria").innerText = d.pria.panggilan;
            document.getElementById("cp_wanita").innerText = d.wanita.panggilan;
            document.getElementById("cover").style.backgroundImage = `url('${d.bg_cover}')`;
            
            // Render Mempelai
            document.getElementById("mempelai_container").innerHTML = `
                <div class="mempelai-card animate__animated animate__fadeInLeft">
                    <img src="${d.pria.foto}" class="mempelai-img">
                    <h3 style="font-family:'Playfair Display'; color:var(--gold); font-size:1.8rem">${d.pria.lengkap}</h3>
                    <p class="ortu-text">${d.pria.urutan_anak} dari pasangan <br><b>Bpk. ${d.pria.ayah} & Ibu ${d.pria.ibu}</b></p>
                </div>
                <div class="mempelai-card animate__animated animate__fadeInRight">
                    <img src="${d.wanita.foto}" class="mempelai-img">
                    <h3 style="font-family:'Playfair Display'; color:var(--gold); font-size:1.8rem">${d.wanita.lengkap}</h3>
                    <p class="ortu-text">${d.wanita.urutan_anak} dari pasangan <br><b>Bpk. ${d.wanita.ayah} & Ibu ${d.wanita.ibu}</b></p>
                </div>
            `;

            // Event Details
            document.getElementById("e_tgl").innerText = d.acara.akad.tanggal;
            document.getElementById("e_jam").innerText = d.acara.akad.jam;
            document.getElementById("e_lok").innerText = d.acara.akad.tempat;
            document.getElementById("btn_peta").href = d.acara.akad.map;
            
            // Set Music Source
            audio.src = d.musik;

            // Countdown Logic (Auto Sync with JSON)
            const targetDate = new Date(d.acara.akad.tanggal_iso.replace(/-/g, "/")).getTime();
            const timer = setInterval(() => {
                const now = new Date().getTime();
                const diff = targetDate - now;

                if (diff < 0) {
                    clearInterval(timer);
                    document.getElementById("countdown").innerHTML = "<b>ACARA SEDANG BERLANGSUNG</b>";
                    return;
                }

                document.getElementById("days").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById("hours").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("mins").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("secs").innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }, 1000);
        });
    </script>
</body>
</html>
