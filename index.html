<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #FDFBF8; 
            color: #8B6B4F; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
    </style>
</head>
<body>
    <p>Loading...</p>
    <script>
        const params = new URLSearchParams(window.location.search);
        const client = params.get('c');
        
        if (!client) {
            document.body.innerHTML = 'Error: Parameter ?c= tidak ada';
        } else {
            fetch(`public/clients/${client}/data.json`)
                .then(res => {
                    if (!res.ok) throw new Error('Not found');
                    return res.json();
                })
                .then(data => {
                    // AUTO TERRA-SOFT, tapi tetap bisa pakai template lain
                    const template = data.meta?.template || 'terra-soft';
                    window.location.href = `templates/${template}/index.html${window.location.search}`;
                })
                .catch(err => {
                    console.error(err);
                    document.body.innerHTML = 'Error: Data undangan tidak ditemukan. Periksa kembali link Anda.';
                });
        }
    </script>
</body>
</html>
