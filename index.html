<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{--gold:#d4af37;--bg:#000;--card:#111;--text:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#000;color:#fff}
section{padding:80px 20px;max-width:1100px;margin:auto}
.title{font-family:'Cormorant Garamond',serif;font-size:48px;color:var(--gold);text-align:center;margin-bottom:40px}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative}
.hero-bg{position:absolute;inset:0;background-size:cover;filter:brightness(.35)}
.hero-content{position:relative;z-index:2}
.hero h1{font-size:70px;color:var(--gold)}
.btn{background:var(--gold);color:#000;padding:12px 24px;border-radius:30px;display:inline-block;margin-top:20px}
.card{background:#111;padding:20px;border-radius:16px;margin:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.count{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px}
.box{text-align:center}
.gallery{columns:3;column-gap:10px}
.gallery img{width:100%;margin-bottom:10px;border-radius:10px}
.music{position:fixed;right:20px;bottom:20px;width:55px;height:55px;border-radius:50%;background:gold;border:none}
</style>
</head>

<body>

<div id="loading" style="position:fixed;inset:0;background:#000;display:grid;place-items:center">Loading...</div>

<audio id="music" loop></audio>
<button class="music" onclick="toggleMusic()">♫</button>

<section class="hero">
<div class="hero-bg" id="coverBg"></div>
<div class="hero-content">
<h1 id="heroName">Loading...</h1>
<p id="heroDate"></p>
<p>Kepada: <b id="guestName"></b></p>
<a href="#main" class="btn">Buka</a>
</div>
</section>

<main id="main">

<section>
<h2 class="title">Countdown</h2>
<div class="count">
<div class="box"><b id="d">0</b><br>Hari</div>
<div class="box"><b id="h">0</b><br>Jam</div>
<div class="box"><b id="m">0</b><br>Menit</div>
<div class="box"><b id="s">0</b><br>Detik</div>
</div>
</section>

<section>
<h2 class="title">Mempelai</h2>
<div class="grid">
<div class="card">
<img id="imgPria">
<h3 id="namaPria"></h3>
<p id="ortuPria"></p>
</div>
<div class="card">
<img id="imgWanita">
<h3 id="namaWanita"></h3>
<p id="ortuWanita"></p>
</div>
</div>
</section>

<section>
<h2 class="title">Acara</h2>
<div class="grid">
<div class="card">
<h3>Akad</h3>
<p id="akad"></p>
<a id="mapAkad" target="_blank" class="btn">Lokasi</a>
</div>
<div class="card">
<h3>Resepsi</h3>
<p id="resepsi"></p>
<a id="mapResepsi" target="_blank" class="btn">Lokasi</a>
</div>
</div>
</section>

<section>
<h2 class="title">Gallery</h2>
<div class="gallery" id="gallery"></div>
</section>

<section>
<h2 class="title">Amplop</h2>
<div class="card" style="text-align:center">
<div id="rekening"></div>
<button onclick="copyRek()" class="btn">Salin</button>
<div id="qr"></div>
</div>
</section>

</main>

<script>
const API='https://script.google.com/macros/s/AKfycbwTA7vv_k7FrtMjSO5vR4tJ-C8S-oYqmT24eQq0jER-SoynrlksPRNjT8yrwCes8ppURA/exec';

const q=new URLSearchParams(location.search);
const slug=q.get('u')||'zeya-putra';
const guest=q.get('nama')||'Tamu Undangan';
document.getElementById('guestName').innerText=decodeURIComponent(guest);

function formatDate(x){
return new Date(x).toLocaleString('id-ID',{
weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'
});
}

fetch(API+'?slug='+slug)
.then(r=>r.json())
.then(res=>{
const d=res.data.find(x=>x.slug===slug);
if(!d)return;

document.title=d.pria_nama+' & '+d.wanita_nama;
heroName.innerText=d.pria_nama+' & '+d.wanita_nama;
heroDate.innerText=formatDate(d.waktu_display);

coverBg.style.backgroundImage='url('+d.foto_sampul+')';

imgPria.src=d.pria_foto;
imgWanita.src=d.wanita_foto;

namaPria.innerText=d.pria_nama;
namaWanita.innerText=d.wanita_nama;

ortuPria.innerText=d.pria_ortu;
ortuWanita.innerText=d.wanita_ortu;

akad.innerHTML=formatDate(d.akad_tgl)+'<br>'+d.akad_lokasi;
resepsi.innerHTML=formatDate(d.resepsi_tgl)+'<br>'+d.resepsi_lokasi;

mapAkad.href=d.map_akad;
mapResepsi.href=d.map_resepsi;

rekening.innerText=d.bank_data;

if(d.rekening_qr) qr.innerHTML='<img src="'+d.rekening_qr+'" width="200">';

if(d.gallery_urls){
gallery.innerHTML=d.gallery_urls.split(',').map(v=>'<img src="'+v.trim()+'">').join('');
}

if(d.musik_url) music.src=d.musik_url;

countdown(d.waktu_display);
loading.style.display='none';
});

function countdown(t){
setInterval(()=>{
let g=new Date(t)-new Date();
if(g<0)g=0;
d.innerText=Math.floor(g/86400000);
h.innerText=Math.floor(g/3600000)%24;
m.innerText=Math.floor(g/60000)%60;
s.innerText=Math.floor(g/1000)%60;
},1000);
}

function toggleMusic(){music.paused?music.play():music.pause();}
function copyRek(){navigator.clipboard.writeText(rekening.innerText);alert('Disalin');}
</script>

</body>
</html>
