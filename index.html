<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Digital - Omahaksara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-gold: #c5a059; --soft-bg: #fdfbf7; --text-dark: #333; }
        body, html { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: var(--soft-bg); color: var(--text-dark); scroll-behavior: smooth; overflow-x: hidden; }
        
        /* Loading Screen */
        #loader { position: fixed; z-index: 9999; background: white; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        /* Hero Section */
        #section-cover { height: 100vh; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/1920/1080?wedding') center/cover no-repeat; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; }
        .hero-title { font-family: 'Great Vibes', cursive; font-size: 5rem; margin: 10px 0; }
        .btn-open { margin-top: 30px; padding: 12px 30px; background-color: var(--primary-gold); color: white; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; }

        section { padding: 80px 20px; text-align: center; }
        .couple-photo { width: 200px; height: 200px; border-radius: 50%; border: 5px solid var(--primary-gold); object-fit: cover; margin-bottom: 20px; }
        .event-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 20px auto; max-width: 500px; }
        
        .audio-control { position: fixed; bottom: 20px; right: 20px; z-index: 999; background: var(--primary-gold); color: white; width: 50px; height: 50px; border-radius: 50%; display: none; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader"><h2>Memuat Undangan...</h2></div>

    <div class="audio-control" onclick="toggleMusic()" id="music-btn">♫</div>
    <audio id="myAudio" loop><source id="audio-src" src="" type="audio/mpeg"></audio>

    <div id="main-content" style="display:none;">
        <section id="section-cover">
            <div style="letter-spacing: 5px; text-transform: uppercase;">The Wedding Of</div>
            <h1 class="hero-title" id="display-couple-names">... & ...</h1>
            <div style="margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.3);">
                <p>Kepada Yth. Bapak/Ibu/Saudara/i</p>
                <h2 id="guest-name">Tamu Undangan</h2>
            </div>
            <button class="btn-open" onclick="openInvitation()">Buka Undangan</button>
        </section>

        <section id="couple">
            <h2 style="font-family: 'Great Vibes'; font-size: 3.5rem; color: var(--primary-gold);">Mempelai</h2>
            <div style="display: flex; justify-content: space-around; flex-wrap: wrap; gap: 30px; max-width: 1000px; margin: 0 auto;">
                <div>
                    <img id="img-pria" src="" class="couple-photo">
                    <h2 id="name-pria" style="font-family: 'Great Vibes'; font-size: 2.5rem;"></h2>
                    <p>Putra dari <br><span id="parents-pria"></span></p>
                </div>
                <div style="align-self: center; font-family: 'Great Vibes'; font-size: 3rem; color: var(--primary-gold);">&</div>
                <div>
                    <img id="img-wanita" src="" class="couple-photo">
                    <h2 id="name-wanita" style="font-family: 'Great Vibes'; font-size: 2.5rem;"></h2>
                    <p>Putri dari <br><span id="parents-wanita"></span></p>
                </div>
            </div>
        </section>

        <section id="event" style="background-color: #f9f6f0;">
            <h2 style="font-family: 'Great Vibes'; font-size: 3.5rem; color: var(--primary-gold);">Acara</h2>
            <div class="event-card">
                <h3>Akad Nikah</h3>
                <p><b id="date-akad"></b></p>
                <hr>
                <p id="address"></p>
                <a id="link-maps" href="#" target="_blank" class="btn-open" style="display:inline-block; font-size: 0.8rem; text-decoration:none;">Buka Google Maps</a>
            </div>
        </section>

        <footer style="background: var(--primary-gold); color: white; padding: 40px; text-align: center;">
            <p>Terima Kasih</p>
            <h2 id="footer-names" style="font-family: 'Great Vibes';"></h2>
            <p style="font-size: 0.7rem; opacity: 0.8;">Created by Omahaksara</p>
        </footer>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxNJAM9Zg9Aw1iw5G1aw3ItYmjhqlcNkgbXofz2SCm0RxUi0cmfyNcGQQcok7eiVbCRLw/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('u');
        const guest = urlParams.get('to');

        if (guest) document.getElementById('guest-name').innerText = guest.replace(/\+/g, ' ');

        fetch(webAppUrl)
            .then(res => res.json())
            .then(allData => {
                const data = allData[slug];
                if (data) {
                    // Isi Data
                    document.getElementById('display-couple-names').innerText = data.pria.nama.split(' ')[0] + ' & ' + data.wanita.nama.split(' ')[0];
                    document.getElementById('name-pria').innerText = data.pria.nama;
                    document.getElementById('img-pria').src = data.pria.foto;
                    document.getElementById('parents-pria').innerText = data.pria.ayah + ' & ' + data.pria.ibu;
                    
                    document.getElementById('name-wanita').innerText = data.wanita.nama;
                    document.getElementById('img-wanita').src = data.wanita.foto;
                    document.getElementById('parents-wanita').innerText = data.wanita.ayah + ' & ' + data.wanita.ibu;
                    
                    document.getElementById('date-akad').innerText = data.waktu.akad;
                    document.getElementById('address').innerText = data.lokasi.alamat;
                    document.getElementById('link-maps').href = data.lokasi.maps;
                    document.getElementById('audio-src').src = data.fitur.musik;
                    document.getElementById('footer-names').innerText = data.pria.nama.split(' ')[0] + ' & ' + data.wanita.nama.split(' ')[0];
                    
                    // Tampilkan Konten
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    document.getElementById('myAudio').load();
                } else {
                    document.getElementById('loader').innerHTML = "<h2>Undangan tidak ditemukan.</h2>";
                }
            });

        const audio = document.getElementById("myAudio");
        function openInvitation() {
            window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
            audio.play();
            document.getElementById('music-btn').style.display = 'flex';
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); document.getElementById('music-btn').innerText = "♫"; }
            else { audio.pause(); document.getElementById('music-btn').innerText = "✖"; }
        }
    </script>
</body>
</html>
