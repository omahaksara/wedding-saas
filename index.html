<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation - Zeya Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Montserrat:wght@300;400;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #b08d57; --light-gold: #d4af37; --cream: #fdfaf7; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--cream); overflow-x: hidden; }
        #cover { height: 100vh; width: 100%; position: fixed; top: 0; z-index: 1000; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; transition: 1.2s ease-in-out; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); }
        .cover-content { position: relative; color: white; text-align: center; z-index: 2; padding: 20px; }
        .cover-content h1 { font-family: 'Alex Brush', cursive; font-size: 4rem; margin: 10px 0; }
        .countdown { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .count-box { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); padding: 10px; border-radius: 8px; min-width: 65px; border: 1px solid rgba(255,255,255,0.3); }
        .count-box span { display: block; font-size: 1.2rem; font-weight: bold; }
        .btn-buka { padding: 12px 35px; background: var(--light-gold); color: white; border: none; border-radius: 30px; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .hidden { display: none; }
        section { padding: 80px 20px; text-align: center; }
        .mempelai-card { background: white; padding: 30px; border-radius: 150px 150px 20px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .mempelai-img { width: 200px; height: 300px; object-fit: cover; border-radius: 100px 100px 10px 10px; border: 4px solid var(--light-gold); }
        #music-btn { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background: var(--light-gold); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1100; display:none; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <audio id="audio" loop></audio>
    <div id="music-btn" onclick="toggleMusic()"><i class="fas fa-compact-disc"></i></div>

    <div id="cover">
        <div class="overlay"></div>
        <div class="cover-content">
            <p>THE WEDDING OF</p>
            <h1 id="nama_pria">Budi</h1><h1>&</h1><h1 id="nama_wanita">Ani</h1>
            <div class="countdown">
                <div class="count-box"><span id="d">0</span><small>HARI</small></div>
                <div class="count-box"><span id="h">0</span><small>JAM</small></div>
                <div class="count-box"><span id="m">0</span><small>MENIT</small></div>
                <div class="count-box"><span id="s">0</span><small>DETIK</small></div>
            </div>
            <button class="btn-buka" onclick="buka()"> <i class="fas fa-envelope-open"></i> BUKA UNDANGAN</button>
        </div>
    </div>

    <main id="konten" class="hidden">
        <section id="couple">
            <h2 style="font-family:'Alex Brush'; font-size: 3rem; color: var(--gold); margin-bottom: 30px;">Mempelai</h2>
            <div id="mempelai_list"></div>
        </section>
    </main>

    <script>
        const audio = document.getElementById("audio");
        let play = false;

        function buka() {
            document.getElementById("cover").style.transform = "translateY(-100%)";
            document.getElementById("konten").classList.remove("hidden");
            document.getElementById("music-btn").style.display = "flex";
            audio.play().catch(() => console.log("User must interact first"));
            play = true;
        }

        function toggleMusic() {
            if(play) { audio.pause(); } else { audio.play(); }
            play = !play;
        }

        const id = new URLSearchParams(window.location.search).get("id") || "budi-ani";
        
        fetch("data.json").then(r => r.json()).then(data => {
            const d = data[id];
            if(!d) return;

            document.getElementById("nama_pria").innerText = d.pria.panggilan;
            document.getElementById("nama_wanita").innerText = d.wanita.panggilan;
            document.getElementById("cover").style.backgroundImage = `url('${d.bg_cover}')`;
            audio.src = d.musik;

            // Render Mempelai
            const list = `
                <div class="mempelai-card">
                    <img src="${d.pria.foto}" class="mempelai-img">
                    <h3 style="color:var(--gold); margin:15px 0">${d.pria.lengkap}</h3>
                    <p style="font-size:0.8rem">${d.pria.urutan_anak} dari pasangan <br> Bpk. ${d.pria.ayah} & Ibu ${d.pria.ibu}</p>
                </div>
                <div class="mempelai-card">
                    <img src="${d.wanita.foto}" class="mempelai-img">
                    <h3 style="color:var(--gold); margin:15px 0">${d.wanita.lengkap}</h3>
                    <p style="font-size:0.8rem">${d.wanita.urutan_anak} dari pasangan <br> Bpk. ${d.wanita.ayah} & Ibu ${d.wanita.ibu}</p>
                </div>
            `;
            document.getElementById("mempelai_list").innerHTML = list;

            // Countdown Logic (Perbaikan format tanggal)
            const target = new Date(d.acara.akad.tanggal_iso.replace(/-/g, "/")).getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const diff = target - now;
                if(diff < 0) return;
                document.getElementById("d").innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById("h").innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById("m").innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById("s").innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }, 1000);
        });
    </script>
</body>
</html>
