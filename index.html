<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wedding Invitation | Omah Aksara</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

    <style>
        :root { --bg: #050505; --gold: #d4af37; --gold2: #f5e6a8; --white: #ffffff; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); color: var(--white); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        #loader { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .hero { height: 100vh; height: 100dvh; width: 100%; display: flex; align-items: center; justify-content: center; text-align: center; position: relative; background-size: cover; background-position: center; }
        .hero::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.8)); z-index: 1; }
        .hero-content { position: relative; z-index: 10; padding: 20px; width: 100%; max-width: 500px; }
        .overlay-card { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); padding: 40px 25px; border-radius: 30px; }
        h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 10vw, 4rem); margin: 15px 0; }
        .btn-open { background: linear-gradient(45deg, var(--gold), var(--gold2)); color: #111; border: none; padding: 15px 35px; border-radius: 50px; font-weight: 700; letter-spacing: 2px; cursor: pointer; margin-top: 25px; text-transform: uppercase; }
        main { display: none; }
        section { padding: 80px 20px; max-width: 600px; margin: auto; text-align: center; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(212, 175, 55, 0.15); border-radius: 20px; padding: 30px; margin-bottom: 25px; }
        .profile-img { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--gold); object-fit: cover; margin-bottom: 15px; }
        .music-toggle { position: fixed; bottom: 25px; right: 25px; width: 50px; height: 50px; background: var(--gold); color: #000; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(212,175,55,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>
    <audio id="bgm" loop><source id="musicSrc" src=""></audio>
    <div class="music-toggle" id="mBtn" onclick="toggleMusic()">♫</div>

    <div class="hero" id="cover">
        <div class="hero-content" data-aos="zoom-in">
            <div style="letter-spacing: 5px; font-size: 0.7rem; color: var(--gold2);">THE WEDDING OF</div>
            <h1 id="heroName">Memuat...</h1>
            <div class="overlay-card">
                <div style="font-size: 0.9rem; opacity: 0.8;">Kepada Yth.</div>
                <div id="guestName" style="font-size: 1.2rem; font-weight: 600; margin: 10px 0 25px 0;">Tamu Undangan</div>
                <button class="btn-open" onclick="openInvitation()">Buka Undangan</button>
            </div>
        </div>
    </div>

    <main id="main">
        <section data-aos="fade-up">
            <h2 style="font-family: 'Cormorant Garamond'; font-size: 2.5rem; color: var(--gold2);">Mempelai</h2>
            <div style="margin-top: 40px;">
                <img id="malePhoto" class="profile-img">
                <h3 id="maleName"></h3>
                <p id="maleParent" style="font-size: 0.85rem; opacity: 0.6;"></p>
            </div>
            <div style="font-family: 'Cormorant Garamond'; font-size: 3rem; color: var(--gold); margin: 20px 0;">&</div>
            <div>
                <img id="femalePhoto" class="profile-img">
                <h3 id="femaleName"></h3>
                <p id="femaleParent" style="font-size: 0.85rem; opacity: 0.6;"></p>
            </div>
        </section>

        <section><div id="storyWrap"></div></section>

        <section>
            <div class="card">
                <h3 style="color: var(--gold2); margin-bottom: 15px;">Kado Digital</h3>
                <div id="giftData" style="font-weight: 600; padding: 15px; border: 1px dashed var(--gold); border-radius: 10px;"></div>
            </div>
        </section>

        <footer style="padding: 40px; text-align: center; font-size: 0.7rem; opacity: 0.4; letter-spacing: 3px;">
            DESIGNED BY OMAH AKSARA
        </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script>
        // LINK API VERSI 9 FIX
        const API = "https://script.google.com/macros/s/AKfycbz3S69wLBYLgy9KydJfwPM6ZThMiAHpmRgnhN_Vv7_YM2k5VC9x5xJbmhy3UDPevIViig/exec";
        
        const params = new URLSearchParams(location.search);
        const slug = params.get("u") || "zeya-putra";
        const guest = params.get("to") || "Tamu Undangan";
        document.getElementById("guestName").innerText = guest;

        async function init() {
            try {
                const res = await fetch(API + "?u=" + encodeURIComponent(slug));
                const json = await res.json();
                if(!json.status) return;
                
                const d = json.config || json.data[0];
                const cover = document.getElementById("cover");
                cover.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('${d.foto_sampul}')`;
                
                document.getElementById("heroName").innerText = d.pria_nama.split(' ')[0] + " & " + d.wanita_nama.split(' ')[0];
                document.getElementById("malePhoto").src = d.pria_foto;
                document.getElementById("maleName").innerText = d.pria_nama;
                document.getElementById("maleParent").innerText = d.pria_ortu;
                document.getElementById("femalePhoto").src = d.wanita_foto;
                document.getElementById("femaleName").innerText = d.wanita_nama;
                document.getElementById("femaleParent").innerText = d.wanita_ortu;
                document.getElementById("giftData").innerText = d.bank_data;
                document.getElementById("musicSrc").src = d.musik_url;
                document.getElementById("bgm").load();

                let sHtml = "";
                for(let i=1; i<=3; i++) {
                    if(d["cerita_"+i+"_teks"]) {
                        sHtml += `<div class="card" data-aos="fade-up">
                            ${d["foto_cerita_"+i] ? `<img src="${d["foto_cerita_"+i]}" style="width:100%; border-radius:15px; margin-bottom:15px;">` : ""}
                            <p style="font-size:0.9rem; line-height:1.7;">${d["cerita_"+i+"_teks"]}</p>
                        </div>`;
                    }
                }
                document.getElementById("storyWrap").innerHTML = sHtml;
                document.getElementById("loader").style.display = "none";
                AOS.init({ duration: 1000, once: true });
            } catch (e) { console.error(e); }
        }

        function openInvitation() {
            document.getElementById("cover").style.display = "none";
            document.getElementById("main").style.display = "block";
            document.getElementById("mBtn").style.display = "flex";
            document.getElementById("bgm").play().catch(() => {});
            window.scrollTo(0,0);
        }

        function toggleMusic() {
            const a = document.getElementById("bgm");
            const b = document.getElementById("mBtn");
            if(a.paused) { a.play(); b.innerText = "♫"; }
            else { a.pause(); b.innerText = "✖"; }
        }
        init();
    </script>
</body>
</html>
