<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif;
            background: #FBF8F3; 
            color: #C87941; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            text-align: center;
        }
        .wrap { animation: fadeIn 1s ease; }
        .names { 
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0.5rem 0;
        }
        .sub { 
            font-size: 0.8rem; 
            letter-spacing: 0.2em; 
            text-transform: uppercase;
            opacity: 0.7;
        }
        .dots::after { content: ''; animation: dots 1.5s infinite; }
        @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="sub">The Wedding Of</div>
        <div id="names" class="names">...</div>
        <div class="sub">membuka undangan<span class="dots"></span></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const client = params.get('c');
        
        if (!client) {
            document.getElementById('names').textContent = 'Aksara';
        } else {
            fetch(`public/clients/${client}/data.json`)
                .then(res => res.json())
                .then(data => {
                    const g = data.couple?.groom?.nickname || '';
                    const b = data.couple?.bride?.nickname || '';
                    document.getElementById('names').textContent = `${g} & ${b}`;
                    
                    const template = data.meta?.template || 'terra-soft';
                    // kasih jeda 1.2 detik biar keliatan keren
                    setTimeout(() => {
                        window.location.href = `templates/${template}/index.html${window.location.search}`;
                    }, 1200);
                })
                .catch(() => {
                    document.getElementById('names').textContent = 'Undangan';
                });
        }
    </script>
</body>
</html>
