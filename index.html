<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body{margin:0;font-family:sans-serif;background:#fdfaf7;text-align:center}
section{padding:50px 20px}
#cover{position:fixed;width:100%;height:100%;background:#000;color:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999;transition:1s}
.hidden{display:none}
button{padding:10px 20px;border:none;background:#b08d57;color:#fff;border-radius:20px}

.count{display:flex;justify-content:center;gap:10px}
.box{background:#fff;padding:10px;border-radius:10px}

.slide{display:none;width:100%;border-radius:10px}
.slide.active{display:block}

.timeline{max-width:400px;margin:auto}
.item{opacity:0;transform:translateY(30px);transition:.5s}
.item.show{opacity:1;transform:translateY(0)}
</style>
</head>

<body>

<audio id="audio" loop></audio>

<div id="cover">
<h2>The Wedding Of</h2>
<h1 id="nama"></h1>
<p>Kepada Yth:</p>
<h3 id="guest">Tamu Undangan</h3>
<button onclick="startApp()">Buka</button>
</div>

<div id="main" class="hidden">

<section>
<h2>Mempelai</h2>
<div id="couple"></div>
</section>

<section>
<h2>Countdown</h2>
<div class="count">
<div class="box"><span id="d">0</span><br>Hari</div>
<div class="box"><span id="h">0</span><br>Jam</div>
<div class="box"><span id="m">0</span><br>Menit</div>
<div class="box"><span id="s">0</span><br>Detik</div>
</div>
</section>

<section>
<h2>Gallery</h2>
<div id="gallery"></div>
</section>

<section>
<h2>Love Story</h2>
<div class="timeline">
<div class="item">Awal bertemu</div>
<div class="item">Lamaran</div>
<div class="item">Menikah</div>
</div>
</section>

<section>
<h2>Gift</h2>
<p id="dana"></p>
<button onclick="copyRek()">Salin</button>
</section>

</div>

<script>
// ambil id & tamu
const params = new URLSearchParams(location.search);
const id = params.get("id") || "budi-ani";
const guest = params.get("to");

if(guest) document.getElementById("guest").innerText = guest;

// load JSON
fetch("data.json").then(r=>r.json()).then(data=>{
const d = data[id];

document.getElementById("nama").innerText = d.pria.panggilan + " & " + d.wanita.panggilan;

// couple
document.getElementById("couple").innerHTML = `
<img src="${d.pria.foto}" width="150">
<p>${d.pria.lengkap}</p>
<img src="${d.wanita.foto}" width="150">
<p>${d.wanita.lengkap}</p>
`;

// gallery
document.getElementById("gallery").innerHTML = d.gallery.map((g,i)=>`
<img src="${g}" class="slide ${i==0?'active':''}">
`).join("");

// musik
document.getElementById("audio").src = d.musik;

// gift
document.getElementById("dana").innerText = d.gift.dana;

// countdown
const target = new Date(d.acara.tanggal_iso).getTime();
setInterval(()=>{
const now = new Date().getTime();
const diff = target - now;
if(diff<=0)return;

dEl("d",diff/(1000*60*60*24));
dEl("h",(diff/(1000*60*60))%24);
dEl("m",(diff/(1000*60))%60);
dEl("s",(diff/1000)%60);
},1000);

function dEl(id,val){
document.getElementById(id).innerText=Math.floor(val);
}
});

// buka
function startApp(){
cover.style.opacity=0;
setTimeout(()=>{cover.style.display="none";main.classList.remove("hidden")},1000);
audio.play().catch(()=>document.body.onclick=()=>audio.play());
}

// slider
let i=0;
setInterval(()=>{
const s=document.querySelectorAll(".slide");
if(!s.length)return;
s[i].classList.remove("active");
i=(i+1)%s.length;
s[i].classList.add("active");
},3000);

// animasi timeline
window.onscroll=()=>{
document.querySelectorAll(".item").forEach(el=>{
if(el.getBoundingClientRect().top<window.innerHeight-50)el.classList.add("show");
});
};

// copy
function copyRek(){
navigator.clipboard.writeText(document.getElementById("dana").innerText);
alert("Disalin");
}
</script>

</body>
</html>
